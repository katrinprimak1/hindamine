<script>
const FORMSPREE_URL = "https://formspree.io/f/mvzdggww";
const INTERVIEW_A = {"id": "real_Anna-Liisa", "label": "Anna-Liisa", "blocks": [{"nr": 1, "title": "SISSEJUHATUS JA TAUST", "tpb": null, "qa": [{"type": "k", "k": "K1", "q": "Kirjelda palun oma ettevõtet – millega see tegeleb ning milline on sinu enda roll ettevõttes.", "a": "Meie ettevõte on dokumendihalduse tarkvara arendav ettevõte, et nad on seda juba 25 aastat teinud. Nad on mõnes mõttes nii-öelda turu arvamusliider ja vist ka turuliider endiselt täna dokumendihalduse valdkonnas. Ja dokumendihaldus on faili haldusest, ehk siis ma ei tea, Dropboxid ja sellised teenused — veidi erinev. Dokumendihaldus on täiesti eraldiseisev valdkond, mis on väga reguleeritud selles vaates, et mismoodi seda infot seal hallatakse, ja sellele on lausa magistrikraad. Ta pakub, nii-öelda, eelkõige — kirjeldab seda ja pakub siis tarkvarana teenusena võimalust ettevõtetel, kes on väga reguleeritud valdkondades, oma dokumente ja informatsiooni meie protsesside või meie tarkvara abil hallata täpselt niimoodi, nagu seadus seda ette näeb. Et sa peaksid hoidma alles raamatupidamisdokumendid 7 aastat ja ja kõikvõimalikud muud, nii-öelda, avalikuks kasutamiseks või piiratud, nii-öelda, nähtavusega dokumendid. Võib-olla sa oled näinud, ma ei tea, riigis on mingisugused salastatud dokumendid, onju — et siis samamoodi on see võimalik selle tarkvaraga teha. Ja meie ettevõte pakubki sellist tarkvarateenust, nii-öelda tarkvara platvormi näol, ja lisaks pakub ka veel konsultatsiooniteenust ja koolitusteenust, et majasiseseid dokumendihaldureid, aga ka tavakasutajaid koolitada — selles vaates, mis on täna üldse võimalik turul dokumendihalduses teha, ja kuidas seda tarkvara paremini kasutada. Mis on dokumendihalduse alased, nii-öelda, eripärad, mida nad võib-olla ei oska ette näha, juhul kui dokumendihalduriks on saanud keegi näiteks personaliinimene ja tal ei olegi dokumendihalduse tausta. Vot, ja mina olen selles ettevõttes tootedirektor ehk siis mina vastutan tootejuhtide töö eest, kes siis otsustavad — kõigepealt hindavad mõjupõhjad, millised on kõige olulisemad, nii-öelda, arendusideed või probleemid, mida me võiksime arendada. Valideerivad seda kasutajate peal ja siis juhivad selle arenduse valmimist. Ja disainiosakond, kes samamoodi töötab palju kasutajatega, on minu valdkonnas."}, {"type": "k", "k": "K2", "q": "Millised on teie peamised kliendid ja kuidas sa nendega kokku puutud.", "a": "Meie peamised kliendid on tegelikult — meil on seinast sein, aga me ise näeme, et meie põhiline sihtturg on väga suured ja keerulises reguleeritud valdkonnas toimetavad ettevõtted, sealhulgas avalik sektor, kellel on kohustus informatsiooni teatud viisil ja teatud aegadeks või aegade vältel talletada. Ja kuidas mina kasutajatega kokku puutun, või klientidega — enamasti ma käin kas uute potentsiaalsete klientide, nii-öelda, kaardistamise või nende vajaduste kaardistamise ja esmaste pitch'ide koosolekutel, kus ma siis esindan tootevaldkonda ja, nii-öelda, viin selle informatsiooni. Vahetevahel teen ise ka kasutajaintervjuusid, küll enam mitte nii palju, ja ma tarbin, nii-öelda, intervjuu analüüsi tulemusi, mis on siis tootejuhtidelt või disaineritelt tulnud, ja aitan teha parimaid võimalikke otsuseid arendusprioriteetide osas. Ja kui on mõne kliendiga suurem plaava, siis käin nendega ka rääkimas ja leiame parima võimaliku viisi, kuidas nad saaksid meile kliendiks edasi jääda ja saaksid kõike seda, mida neil vaja on."}, {"type": "k", "k": "K3", "q": "Kirjelda oma rolli ettevõtte toote või teenuse arendustööde tegemisel ja otsuste tegemisel.", "a": "Minu roll on eelkõige seada siis vastavalt ettevõtte enda strateegiale ja eesmärkidele tootearendusstrateegia — ehk siis minu defineerida on see, kuidas tarkvaraarendus aitab sellel ettevõttel eesmärgid ära tuua. Mina kirjeldan laias laastus nüüd, nii-öelda, need alustalad või valdkonnad, milles me siis järgmised paar aastat peaksime enamjaolt arenema. Ehk siis, et näiteks meie jaoks see on — üks on see, kuidas dokument süsteemi saab. Ehk siis, et kui sul on vaja kuskilt välisest süsteemist seda sisestada või sa pead seda sisestama ise käsitsi otse sinna süsteemi, et siis see peab saama imelihtsaks selleks, et me saaksime olla oma konkurentidest paremad. Valdkond 2 on see, et kui dokument on juba selles süsteemis, et mida sa selle dokumendiga siis teha saad ja mida see dokument peab iseendaga tegema. Põhimõtteliselt ehk siis, et kui su raamatupidamisdokument peab saama kustutatud 7 aasta pärast, et siis kindlasti see ei peaks enam kasutaja kalendrisse seda panema, vaid et see süsteem võiks seda ise ära teha. Ehk siis ka see, mis dokumendiga toimub, peaks olema automatiseeritav või, nii-öelda, toimuma iseenesest, vastavalt sellele, mis varem on defineeritud või mis, ma ei tea, AI näiteks dokumendist välja loeb. Ja kolmas: kuidas seda informatsiooni, mis süsteemi on talletatud — paljudel meie klientidel on seda juba 25 aastat sinna talletatud — et kuidas siis tänaste vahenditega või tänase tehnoloogiaga, näiteks AI, seda informatsiooni kõige paremal võimalikul viisil juhtimisotsuste tegemiseks ära kasutada. Sellepärast, et seda informatsiooni on väga palju, varasemalt ei olnud võimalik teda tarbida väga hästi, sa pidid teadma, mida otsida ja kust kohast. Siis nüüd on AI võimeline täiesti erinevatest dokumentidest, erinevatest infoallikatest selle süsteemi sees konteksti kokku panema. Need on need kolm, nii-öelda, alustala, mis ma meie ettevõtte jaoks olen kirjeldanud. Selle järgi teevad tootejuhid otsuseid, mida arendada, et me sellest väljapoole ei lähe. Et kui meil on mingisugune innovaatiline mõte, siis, nii-öelda, teeme erandotsuse, kas me arendame või mitte, aga kõik arendused peavad kuuluma ühte nendest kolmest alast. Ja me mõõdame neid, ja mõõdikud on ka samamoodi tootevaldkonnas minu, nii-öelda, mõjumõõdikud on minu defineerida. Igas projektis lepime need eraldi kokku, täpsemad mõõdikud, aga vähemalt peavad kõik need arendused kas parandama kasutuskogemust olulisel määral või tooma uut revenue'd, ideaalis mõlemad. See on see, mis on minu kirjeldada, ja siis vastavalt sellele minu tootejuhid leiavad kõige mõjusamad võimalikud arendused või, nii-öelda, projektid, mida nad siis arvavad, et peaks järgmisena tegema. Ja minu ülesanne on siis kogu arendusportfelli tegelikult vastavalt sellele mõjule prioriseerida ja majasiseselt, nii-öelda, viia kogu see teadmine, mis me siis turult teada saime — eelkõige ka kasutajauuringutest — et miks me arvame, et just need on kõige mõjusamad. Sellepärast, et kogu juhatus peab tegelikult sellele arendusportfellile ja nendele prioriteetidele alla kirjutama, siis minu asi on teha ka seda lobitööd — et kui nende arendusprojektidega sinna juhatuse juurde minnakse, siis nad ka rohelise tule saavad, või vähemalt on juhatusel piisavalt informatsiooni, et häid küsimusi küsida. Et me kõik koos, nii-öelda, kõige paremal võimalikul viisil edasi läheme."}]}, {"nr": 2, "title": "PRAEGUNE ARENDUSPRAKTIKA", "tpb": "TPB: Behaviour (tegelik käitumine)", "qa": [{"type": "k", "k": "K4", "q": "Mõtle oma ettevõtte tavapärase toote/teenuse arendusele ja kirjelda palun, kuidas see protsess kujuneb algusest lõpuni.", "a": "Ma natukene sumin ka korra välja, et ma rääkisin sellest prioriteetide listist, aga see prioriteetide list tegelikult kujuneb kogu aeg ja pidevalt. See ei kujune siis, kui me hakkame midagi arendama, vaid neid ideid kogutakse — noh, kust iganes need siis tulevad, vahetevahel tulevad juhatusest, vahetevahel tulevad kliendiintervjuudest — ja neid pannakse pidevalt sinna nimekirja. Meil ei ole kahjuks veel välja kujunenud, kui tihti me seda tegelikult teeme. Ütleme keskeltläbi korra kvartalis me tuleme siis tootejuhtidega kokku ja hindame kõhutunde pealt ära selle, millised nendest ideedest võiksid olla kõige väärtuslikumad. Ja oluline on siin kohal, et tootejuhtide ja minu kõhutunne koosneks sellest, et me oleks enne piisavalt üle ujutanud kasutajaintervjuudest, kvantuuringutest, kõikvõimalikust analüütikast ja, nii-öelda, kasutajatelt ja turult tulnud infost — et meie kõhutunne ei oleks ainult meie isiklik arvamus. Aga ütleme, et see esimene reha, mis me teeme, on piisavalt hea. Tänase teadmise järgi, mis võiksid olla kõige mõjusamad asjad sellest listist, me võtame need valideerimisse — ehk siis järgmised kasutajaintervjuud, mille me teeme, kasvõi kui me testime juba mingi konkreetse teenuse uiksi, siis me selle, nii-öelda, vestluse käigus tavaliselt, nii-öelda, võtame mõne idee, mis selles vistis on veel valideerida, mis võiks selle sihtrühmaga kokku sobida. Ja me anname ka need ideed ühikirjeldustena oma äriarendusmeeskonnale, kes siis, nii-öelda, lähevad ja küsivad potentsiaalsetelt klientidelt, kellele see idee või see toode võiks sobida, ja katsuvad leida kolm klienti, kes on siis nõus eellepingut tegema. Sellepärast, et tootearenduses on selline lugu, et ükskõik kui palju sa kasutajauuringuid teed, lõplik tõde selgub siis, kui sa turule sellega lähed. Ja kui sa pärast saad teada, et tegelikult mitte kellelgi seda vaja ei ole, siis — eriti väikse ettevõtte puhul — sa oled teinud suure investeeringu, mis tegelikult taevast tuleb. Minu, nii-öelda, kogemuse põhjal kõige parem on see, kui sul on juba mingisugused, põhimõtteliselt, mingisugune ettemaks klientidelt olemas — see väga hästi valideerib seda, kas see tegelikult on vajalik. Või see on oi, ja see on väga hea idee, aga mitte mulle. Et see on tavaliselt selline nagu trapp, et kui me leiame mingisugustele nendele ideedele, mida meil on seal Eestis päris palju tegelikult, mingisugused pilootkliendid või eellepingud, siis need saavad tavaliselt, nii-öelda, prioriteediks. Nüüd, UX parendused, mis me ise teame, et me peame tegema, aga ükski klient ei ole nõus nende eest maksma — need on natukene erikeis, et need, nii-öelda, UX-parendused eesmärkide põhjal olen ma mingisuguse, nii-öelda, parima praktika põhjal turult katsunud rahaks arvutada. Ehk siis, et parem UX või parem kasutajakogemus võrdub, ma ei tea, tegelikult potentsiaalselt revenue's nii ja nii palju. Ma ei ole kindel, kas ma selle loogikaga edasi ei lähe, aga praegu tundub hea küll, lihtsalt selleks, et kasutuskogemuse parandused ei jääks alla rahalistele, nii-öelda, numbritele. Ja nüüd, kui meil on olemas see esimene valideerimine kõikidele nendele ideedele, siis me valime nendest... või õigupidi isegi ei vali välja, vaid me seame vastavalt sellele, mis me täna tagasisidena saime, selle ajajoonele, ja sellest formuleerub roadmap. Ja need, mis on siis kõige mõjusamad, need lähevad discovery'sse ehk siis, et me teeme sügavama kliendiuuringu nende jaoks, et siis aru saada, kas päriselt see probleem ikkagi on probleem ja mis see lahendus võiks olla, mida me arendame. Ja siis läheb see disaini ja siis läheb see arendusse."}, {"type": "interv", "k": "K4.täpsustav", "q": "Ja kui arendus on valmis, kas te testite uuesti klientidega või on testimine selleks hetkeks juba lõpule viidud?", "a": "Üldiselt mulle meeldib, kuna ma... see on võib-olla see koht, kus ma kalutatud olen. Ma peaasjalikult töötan väga suurte ja hästi keeruliste süsteemidega, tavaliselt nad on mingisuguse kriitilise tähtsusega, ehk siis vearuumi väga palju ei ole. Siis teeb, noh, teoreetiliselt innovatsiooni ja tootearenduse üsna keeruliseks, sellepärast et klientidele ei meeldi muutused sellistes valdkondades, mida ma teen. Sel juhul on see, et need tooted, mida me teeme, siis tootejuhtidega koos — need uued funktsionaalsused, mis tulevad, enamasti lähevad peale väiksemale grupile klientidele, kes on meiega juba piloodilepingu sõlminud."}, {"type": "k", "k": "K5", "q": "Kuidas te püüate aru saada, mida kliendid või kasutajad tegelikult vajavad?", "a": "Meil on tegelikult väga tore koosolek, kus siis nii kasutajatugi kui müügiinimesed tulevad ja räägivad kliendi probleemist. Me kogume need probleemid kokku ja hästi palju mustreid tuleb sealt — mitmetel klientidel on sama probleem, natukene võib-olla eri nurgast. Ja me saamegi nagu oma tootearenduse ideede ämbrisse uusi asju, aga ka teiselt poolt, nii-öelda, valideerimisse selle, mis on nagu need valusad kohad. Ühesõnaga, meie kliendisuhtlus ühest poolt käib läbi toote tiimi ja disainerite, kes proaktiivselt võtavad klientidega ühendust, et — kuule, ma tahaksin sinuga rääkida, või valideerida või testida midagi. Ja ka teiselt poolt, nii-öelda, äriarenduse ja müügi poolt ja kliendituge poolt, kes toovad neile mustreid ja tellimusi, mida me siis analüüsime. Ja me saadame tagasi nendega mingi lisaküsimused, et me mõistaksime kõikide puhul, mis see probleem on. Ja samamoodi aitab siis, nagu ma enne mainisin, äriarendus neid valideerida, potentsiaalselt — noh, ka neilt alguse saanud tooteideid, et kas see võiks olla see, mis siis lahendaks, ja kas sa oled nõus tegema eelkokkulepet."}]}, {"nr": 3, "title": "KLIENDI JA KASUTAJA ROLL ARENDUSES", "tpb": "TPB: Behaviour + Attitude", "qa": [{"type": "k", "k": "K10", "q": "Too palun üks konkreetne näide olukorrast, kus kliendi sisend muutis teie algset plaani, prioriteeti või lahendust. Kirjelda seda olukorda.", "a": "Hiljuti meil ongi täiesti uus platvorm, mida me tegelikult kõikidele veel live ei ole lasknud. Selle nimi on, nii-öelda, meie uus portaal. See arendati sellepärast, et me saime teada, pärast kliendiuuringutega alustamist umbes aasta aega tagasi, et suurem osa meie sellest 25-aastasest platvormist on arendatud peakasutajate ehk administraatorite ja dokumendihaldurite sõnade alusel, ja nemad siis on ka olnud selle lõppkasutaja hääl. Aga tegelikult, noh, see on tulnud läbi mingisuguse prisma, ja kui me hakkasime lõppkasutajatega otse rääkima, siis tuli välja, et tegelikult see on kasutuskogemuse mõttes kasutamatu. Me jõudsime arendusele, et kuigi adminid armastavad seda vana platvormi — me peame selle osa alles jätma, mis on hea seal ja mida nad väga hindavad — aga me peame nüüd täiesti teistsugust kasutuskogemust hakkama pakkuma läbi portaali. Nüüd meil on see portaal meie, nii-öelda, hinnangul piisava funktsionaalsusega ja peaaegu valmis. Aga kuna seal on hästi palju funktsionaalsust läbi 25 aasta, ja see, mis portaali jõudis, on, nii-öelda, osa sellest, siis me ikkagi otsustasime, et me läheme mitme pilootprogrammiga, nii-öelda, võimalikult erinevate klientidega, et me saaksime aru, kas me oleme nüüd siis päriselt ikkagi piisavad. Ühe, esimese, kõige suurema kliendiga juba avastasime, millised kitsaskohad meil on. Nende puhul me otsustasime, et see klient ei ole meie sihtklient, või seda tüüpi väga suured ja väga, nii-öelda, laiaulatuslike eriarendustega kliendid ei saa olla esimene, nii-öelda, grupp, kes siis seda portaali saab kasutama hakata — et see oleks meie jaoks ebamõistlik. Aga järgmised, siis, täpsemad sihtrühmad või täpsemalt meie vajadustega ja, nii-öelda, problem-solution-fit'iga kooskõlas kliendid andsid meile tagasiside, et meil on üks kindel funktsionaalsus — ehk siis suunamine — puudu. Kuigi me ise arvasime, et ilma suunamiseta saab hakkama küll, vähemalt esimesed kuud, siis nende hinnangul ikkagi ei saa, ja mitte mingil juhul. Ja me, nii-öelda, prioriteetsime selle skoopi natukene ümber niimoodi, et sellesse skoopi mahuks ikkagi suunamine ka, ja osad, siis, kliendiintervjuudest tulenevalt välja tulnud väiksema prioriteediga asjad jäid välja ja suunamine läks sisse. Ja see on siis pilootide põhjal. Nüüd, kui me pilootide põhjal selle skoobi lukku saame, siis pärast seda testime veelkord ja ilmselt läheme live'i."}]}, {"nr": 4, "title": "SUHTUMINE TEENUSEDISAINI / KASUTAJAKESKSUSESSE", "tpb": "TPB: Attitude + Behavioural Beliefs", "qa": [{"type": "k", "k": "K11", "q": "Millist väärtust sa näed kasutajakeskses lähenemises? Põhjenda oma arvamust.", "a": "Ma arvan, et... võib-olla vale inimene, kelle käest küsida. Minu vastus on see, et ilma kasutajateta ei ole võimalik head toodet arendada. See tähendab seda, et kogu arendus peakski olema ainult kasutajakeskne, sellepärast et kui see ei ole kasutajakeskne, siis sa arendad kahjuks ainult iseenda jaoks. Ja enamjaolt need inimesed, kes arendavad toodet, nad teavad juba liiga palju sellest valdkonnast. Noh, nüüd jätta vibe coding välja, eks, mis siis võimaldab igaühele täitsa oma tarkvara arendada. Ja kuna tarkvaraarendus on nii odav tänu sellele, siis ongi okei, kui see on piisav ainult ühele inimesele. Aga kui me nüüd räägime, ma ei tea, software as a service'ist või platvormidest, mis on paljudele, siis ainukene võimalik viis, kuidas olla edukas, siis ka finantsiliselt edukas, on see, kui sa kõnetad suurt hulka kasutajaid või kliente. Kui sa ei ole nende klientidega koos seda sisuliselt arendanud, siis on, noh, imeväike, kui mitte olematu võimalus, et su toode tegelikult kõnetab seda turgu. On mõned tooted, mida ma tean, mis on, noh, umbes nagu loteriimiljonäri, nii-öelda, võimalusega saanud edukaks pärast seda, kui inimesed on täiesti, nagu, vaakumis seda arendanud. Aga see ongi täpselt, noh, õnnemäng, onju, et vahetevahel loto-õnn naeratab sulle, aga suurema osa ajast, 99,9%, seda ei juhtu. Seega kliendikeskne, nii-öelda, tootearendus on ainukene viis, kuidas tagada seda, et sul on mingigi võimalus eduks turul. Ja noh, isegi kui sa esimese tootega välja tuled ja see läks õnneks, siis kui sa niimoodi jätkad, siis on suur võimalus, et sa investeerid tühja, et järgmine skoop tegelikult ei kõneta sinu turgu."}, {"type": "interv", "k": "K11.1", "q": "Kas oled kunagi kahelnud, kas selline lähenemine end ära tasub? Miks?", "a": "Ütleme, et kahtlust ei ole, aga see on hästi selline huvitav joon, mida igapäevaselt siis tootedirektorina ja tootejuhina, nagu, mille pealt tantsida. Mis on see piisavalt pai otsus, mille ma saan teha, et mul on juba piisavalt palju infot ja ma ei pea minema küsima klientide käest — see on mingisugune no-brainer asi — versus, mida ma peaksin minema valideerima. See on alati nagu ressursihalduse küsimus. Ma ei arva, et tootearendus üleüldiselt... seda kahtlust mul ei ole mitte kunagi olnud, et see peab olema. Aga nüüd töö sees, kus see nagu niit jookseb, millised on piisavalt suured või piisavalt väiksed asjad, kus sa siis võid ka ilma kliendi tagasisideta minna — see on alati libe. Ma tunnistan, et ma olen ise selles näpu peale saanud ja, noh, saan ka kohe pitsa kätte pärast seda. Siis tuleb meelde küll, et võiks küsida, ja see ei ole nii keeruline. Ja noh, meie kui eestlaste, nii-öelda, kirstunael on ilmselt see, et me oleme introvertid. See tähendab seda, et lihtsam otsus on alati mitte minna küsima, lihtsalt sellepärast et see sotsiaalne, nii-öelda, osa sellest on nii raske. Jah, ehk siis — millal minna küsima, millal mitte. Ja selle jaoks mina ilmselt tootedirektorina olengi, et hoida meie mingisugust, nii-öelda, seda latti kõrgel, sest ma näen, et kui ma oma toote tiimidele seda kriteeriumiks ei seaks, siis isikuomandust tulenevalt inimesed ei taha minna küsima. Nad tahaksid lihtsalt, nagu, arendada ja oma, nagu, isale keskenduda, et see ei ole, nagu, see ei ole miski, mis tuleb loomulikult. See on siukene lihas, mida tuleb, nagu, jõusaalis harjutada kogu aeg."}, {"type": "k", "k": "K12", "q": "Millised on sinu meelest kasutajakeskse lähenemise kitsaskohad või piirangud?", "a": "No see on ressursimahukam. Või, ma ei ütleks, et seal on piirangud, aga see nõuab ressurssi, onju. Ja kui on inimesed, kes ei ole kliendikeskse tootearendusega varem kokku puutunud, siis nad näevad seda kuluna. Seda on väga keeruline välja selgitada, et see tegelikult pikemas perspektiivis hoiab aega kokku, sellepärast et sa saad kiiremini oma, nii-öelda, vastused kätte ja maandad riske. Piirangud ongi see, et kas sul on tegelikult, kas sa suudad oma aega ja ressursse niimoodi prioriseerida, et sa ikkagi teed selle ära. Ja teine piirang huvitaval kombel on tegelikult disainmõtlemine, mis oma, nii-öelda, siiani kirjeldatud struktuuride kohaselt tegelikult defineerib, mismoodi discovery ja kliendiuuringud peaksid välja nägema. Ja see on disainitud selliselt, et teha võimalikult palju tööd enne arendust ära. Aga AI tööriistadega täna arendus on väga odav. See tähendab seda, et ma arvan, et disainmõtlemise metoodikat tuleks ka vastavalt sellele ümber defineerida — et vahel on isegi need kliendiuuringud võib-olla ressursimahukamad kui mingisuguse kiire prototüübi valmis viskamine, mille jaoks sa peaksid minema lihtsalt intervjueerima kedagi. Kui sa saaksid juba valmis prototüübiga tema juurde minna ja öelda, et — kuule, mõtle nüüd sellele korrale, kui sa uudses frustratsioonis olid selles asjas. Sulle antakse selline asi: kuidas sa seda lahendaksid, või mis tunne on. See kvaliteet, mis sa saad sellisest kliendiuuringust versus hüpoteetilisest, kus sa teed lihtsalt mingisugust, nagu, intervjuud, kus te mõlemad lõpuks ette kujutate seda lahendust erinevalt tegelikult — see on küll üks piirang. Varasemalt oli hästi pai, nii-öelda — kas sa rääkisid inimestega hüpoteetiliselt, katsusid, nii-öelda, kõigepealt laialt aru saada, mis nende kogemused on, ja lõpuks jõudsid kitsamaks ja lootsid, et nad mõtlesid sama asja nagu sina, või katsusid, nagu, tantsida sellel joonel, et kuidas siis ikkagi oma küsimusi võimalikult hästi sõnastada, et sa ei kaalutaks seda kasutajat. Ja siis selle põhjal tegid mingisuguseid otsuseid, lootsid, et sa oled piisavalt palju, nagu, sellest välja pikkinud olulisi kohti tootejuhina, versus nüüd, kus sa saadki juba mingisuguse töötava asjaga nende juurde minna. Ma arvan, et täna see, mis nüüd siis disainmõtlemisest välja tuleb, mis iganes, nii-öelda, metoodikad või protsessid, et need on oluliselt vähem ressursimahukad, ja sa jõuad tegelikult nende vastusteni, mida sul kasutajatelt paja on, palju kiiremini."}]}, {"nr": 5, "title": "SOTSIAALSED JA PROFESSIONAALSED MÕJUTAJAD", "tpb": "TPB: Subjective Norm", "qa": [{"type": "k", "k": "K13", "q": "Kuidas sinu meeskond/kolleegid suhtuvad kasutajakesksesse lähenemisse ja miks?", "a": "Ütleme, see on nagu siukene kaheteraga mõõk, onju, et nad tegelikult väga usuvad sellesse ja nad on näinud neid tulemusi ja nad tahavad seda teha. Aga igapäevaelu tuleb tavaliselt vahele ehk siis, et nii palju asju on vaja teha selleks, et üks kvaliteetne tarkvaratükk live'iks, et tihtilugu need kasutajauuringud või see osa jääb — kõik mattub kõikide teiste asjade alla ja saab vähem, nii-öelda, tähelepanu. Kui mind ilmselt siin ei oleks, siis ma arvan, et seda oleks oluliselt vähem. Ma arvan, et operatiivsed tiimid või, nii-öelda, need, kes praktikaliselt asju läbi viivad, võib-olla ei saagi sellel tasemel igapäevaselt mõelda. Ka mina, kui ma olen tootejuht olnud, et siis ma olen märganud seda, kuidas see, nii-öelda, proaktiivne osa kannatab. Aga ma arvan, et see on ka ajuehitusest inimestel, nii-öelda, niimoodi, sellepärast et me oleme ju peaasjalikult reaktiivseks loodud. Sellepärast et kunagi ammu, kui tiiger põõsast välja hüppas, siis me pidime suutma reageerida, ja me reageerisime sellele, et kõht oli tühi ja oht oli kuskil, või mingisugused muud asjad. Nüüd siis tootejuhtimine ja kasutajauuringud on selline proaktiivse mõtlemise kõige, nii-öelda, suurem valdkond, onju. Ja kui sa ei ole harjunud proaktiivselt mõtlema ja sinu töö peaasjalikult on reaktiivne igapäevaselt, siis sa tegelikult ei tule intuitiivselt selle peale, et sa peaksid nüüd siis proaktiivselt mingisuguse osa mõtlema. See peab olema, tulema, nii-öelda, kõrgemalt. Ja loomulikult tiim peab ka seda uskuma, aga kui seda mantrat ei veeta juhtide poole pealt ja, nagu, ei suudeta selgitada, miks see vajalik on, siis see jääb vajaka. Minu, nii-öelda, ülesanne isiklikult on hinnata mõju, ja ma ei saa mõju hinnata, kui ma ei tea, kui oluline see potentsiaalne funktsionaalsus kliendile lõpuks on. Ja see on see, mida ma neile selgitan, ja nad saavad sellest väga hästi aru. Aga kas nad igapäevaselt iseenda käest seda küsivad? Ilmselt mitte."}, {"type": "k", "k": "K14", "q": "Kuidas juhtkond suhtub klientide kaasamisse arendusotsuste tegemisel? Miks?", "a": "No ütleme, et eks nad... ja meie ettevõte on siis üks nendest paljudest klientidest, kes on mind kutsunud enda ettevõttes tegema muudatusi, ja nad tavaliselt ei telli mult seda, et tule aita meil rohkem kliendikeskseks saada. Nad tulevad ja tellivad või kutsuvad mind, et ma nende, nii-öelda, arenduse, nii-öelda, finantsiliselt ka — või et see nende arendused oleks taas investeeringud ja sellest tuleks mingisugune, nii-öelda, ka kasum tagasi ettevõttele. Ja tavaliselt siis selle käigus selgub ka see, et nad ei tee kliendikeskset tootearendust, ja nad arendavad, ma ei tea, pimesi ja mustas kastis. Loomulikult siis kogu aeg arendajad arendavad, onju, tulevad uued tooted turule, keegi neid ei taha osta, onju, ja arendame järgmist asja, otsitakse erinevaid süüdlasi. Miks see niimoodi on, et ükski arendatud asi tegelikult turul ei lenda — et sellest tuleb siis välja, et nad ei ole kliendikesksed. Ütleme, et alguses on skeptsis väga suur, et miks me peame sinna nii palju aega panema, et meil läheb niikaua kauem, et midagi turule tuua. Aga kui esimene, nii-öelda, pääsuke on käes või esimene tagasiside tuleb, ja see on hoopis teistsugune kui varasemalt tagasiside, siis see usk tuleb. Tänaseks ma ütleks, et ma olen, noh, praeguses ettevõttes 2 aastat töötanud, et juhatuses ei ole mitte kellelgi küsimust ka selle koha pealt, kas klientide tagasiside ja kliendikesksus võiks olla üks meie kriteeriumitest või mitte. Seda kiirustamist, või et saaks ikkagi kiiremini seda teha, seda ikka on, aga see on võib-olla... ma ei tea, natuurist põhineb, et tegevjuhtidel on tavaliselt alati väga kiire kuskile."}, {"type": "k", "k": "K15", "q": "Kuidas on sinu suhtumist või praktikaid mõjutanud laiem ettevõtluskeskkond, näiteks kiirendid, mentorid, sarnased ettevõtted või konkurendid? Miks?", "a": "Raske öelda, sellepärast et, noh, nad tahtsid, või meie koostöö algas niimoodi, et tegelikult tegevjuht pöördus minu poole ja tahtis mind tööle võtta. Ma ütlesin, et ma ei taha tööle tulla, siis ta võttis kellegi teise tööle, ja aasta aega hiljem tuli ikkagi, ütles, et — kuule, aga võtame selle konsultatsiooni. Ehk siis ta oli ise juba ennast kuidagi, nagu, veennud selles, et midagi peab muutuma. Me ei tea, kas — nagu, ma ei ütleks, et see oli kliendikesksus, mida ta tahtis tegelikult muuta. Küll aga ta tahtis oma ettevõtet kasumlikumaks muuta läbi selle, et nüüd siis oleks tootejuhtimine ka seal. Nüüd, nagu, laiemas pildis — minu mentor on näiteks kiirendites, ja ma tean, et vähemalt early stage ettevõtted küll on... ma ei tea, paar nädalat tagasi käisin Teaduspargis koolitamas, ja üks ettevõtetest, kes oli käinud ka minu juures mentorluses varasemalt või suunatud sinna, tänas mind selle eest, et ma julgustasin neid oma tootega võimalikult kiiresti klientide juurde minema. Et nüüd nad on aru saanud, kui palju erinevaid kliendisegmente neil tegelikult on, mida nad selle peale ise ei oleks tulnud. Ja nüüd neil on päriselt valik, millise kliendisegmendiga edasi minna — et siukest asja nagu varem ei olegi olnud. Aga tegelikult, noh, ikka — sa saad sealt kiirendist selle, mingisuguse, kogemuse, et sa pead rääkima klientidega. Ma ei tea, kui kliendikeskseks nad saavad, nii-öelda, oma mindseti poole pealt, aga vähemalt nad saavad selle alustala, nii et neil on mingisugune kogemus selle koha pealt, kuidas kliente siis ikkagi uurida. Ma arvan, et nad päris nagu nulli pärast seda ei lange — ilmselt nad teavad ühel hetkel sinna tagasi tulla, kui nad oma ettevõtte, nii-öelda, arengus sinna jõuavad, et neil on järgmisi ideid vaja või midagi valideerida. Nad vähemalt teavad, kuidas seda teha. Ma arvan, et see kindlasti mõjutab. Nüüd Eestis on toote arendus, nagu, kliendikesksusest, nii-öelda, keskmiselt väga palju maas, võrreldes kõigi või, nagu, eriti Ameerika turuga. Ma ei oska öelda — ma arvan, et sellised kiirendid ja, ma ei tea, disainisprindid ja koolitajate näol, nagu, mida tehakse — see ongi see, kuidas see vaikselt imbub ettevõtetesse. Ja see teadmine tuleb, disainmõtlemine ja disainmõtlemine peaasjalikult on praegu nagu hästi viimase, ma ei tea, 5 aasta jooksul turundusliku terminina, ma arvan, juurdunud. Ehk siis, et seda osatakse juba küsida ja koolitada ka. Aga et kuidas sealt siis edasi — et see disainmõtlemine viiks ka äriliste tulemusteni — see võib-olla on see, mis on täna küsimus. Aga disainmõtlemine, ma arvan, on täitsa juba, nagu, tuttavlik. Iseasi, kas seda, nagu, praktiseeritakse, aga vähemalt kõik teavad, mis asi see on."}]}, {"nr": 6, "title": "VÕIMEKUS JA BARJÄÄRID", "tpb": "TPB: Perceived Behavioural Control", "qa": [{"type": "k", "k": "K17", "q": "Kirjelda ühte olukorda, kus oleksid tahtnud klienti rohkem kaasata, aga see ei õnnestunud. Mis sai takistuseks ja miks?", "a": "Jaa, ma mäletan. Üks minu tööandja — see oli nüüd küll juba päris ammu aega tagasi — mina läksin sinna ettevõttesse tööle tootejuhina. Duš oli see esiteks, et mingit tootejuhtimist, kui sellist, seal ei olnud. Seal oli peaasjalikult projektijuhtimine, ehk siis eelarve ja tähtajad. Ja mina siis ütlesin, et ei-ei-ei, et mina niimoodi ei saa, et mina tahaksin kõigepealt analüütikat saada, ja palusin selle arendajatel peale panna. Ja selle peale ettevõtte tehnoloogiajuht tuli minu juurde, ütles, et niimoodi meil ikkagi asjad ei käi, et sa paned sinna analüütika külge ja vaatad lihtsalt, onju. Me oleme ikkagi seda tüüpi, et... ma sain, noh, tagantjärgi aru, et ongi reguleeritud valdkond, aga ega ta minuga kaasa tegelikult ei olnud nõus mõtlema, et kuidas siis saaks. Ja ei selgitanud, et — meil on, me oleme reguleeritud valdkond, et me peame mingisugusel viisil seda tegema, või et me peame mõtlema nüüd. Vaid vastus oli lihtsalt ei, et meil analüütikat siia külge panna ei saa, ja nii on. Selles ettevõttes ei tehtud ka kasutajauuringuid, sellepärast et ka jällegi vabandusega, et reguleeritud valdkond ja me ei saa ja me ei tohi. Tegelikult tagantjärgi — ma olen selles valdkonnas veel kord töötanud — saab ja tohib. Aga selleks peavad olema inimesed, kes on nõus mõtestama tänaseid protsesse ümber, mitte lihtsalt oma, nii-öelda, mugavusest edasi sõitma."}, {"type": "interv", "k": "K17.1", "q": "Millised ressursid või tingimused puudusid?", "a": "Ma arvan, et kaks poolt. Selles spetsiifilises ettevõttes oli, nii-öelda, mugavus teha asju niimoodi nagu me alati oleme teinud. Et see spetsiifiline inimene oma tööd väga sisuliselt ei teinud, et ta oli väga mugavas positsioonis juhina. Ja lihtsalt niimoodi oli, ja ta ei tahtnud mugavusest välja tulla. Aga avalikus sektoris on näiteks hirm midagi valesti teha — et kõik uus, onju, alati nagu selline avastamise töö, sa võid saada tagasisidet, et sa oledki midagi valesti teinud. Ja avalikus sektoris on see hirm, et me teeme midagi valesti — kas juriidiliselt või, et ma ei tea, avalik arvamus, nagu, rõhub meid pärast seda, või midagi muud. Paljudes ettevõtetes tegelikult see hirm teadmatuses, et — me nüüd proovime kuidagi teistmoodi, et mis siis saab, kes vastutab, ja, et — äkki ma saan karistada selle eest. See on hästi suur teema."}]}, {"nr": 7, "title": "TULEVIKUVAADE JA KAVATSUSED", "tpb": "TPB: Intention", "qa": [{"type": "k", "k": "K18", "q": "Kuidas soovid muuta tänast protsessi kliendi kaasamise vaates järgmistes arendustöödes?", "a": "No toon sulle näite. Üks suur Eesti meediamaja tellis mult hiljuti koolituse, tahtsid vibe-coding'ut saada. Aga siis me, nagu, mõtlesime koos, et mida nad siis ikkagi sellega saavutada tahavad. Ja nende suur probleem, noh, ajas sees on see, et täna kogu maja kasutab erinevaid tööriistu selleks, et, nii-öelda, kirjutada sisendit, mis asju on vaja arendada, või siis seostada. Noh, on hästi suur kontsern, aga nad ise läbi ei mõtle seda, et mida neil siis tegelikult vaja on. Ja me siis otsustasime, et me teeme neile, noh, wipcoding'u bootcamp'i, kus nad — kõik osakonnad, siis personal, mingisugune toimetus, IT samamoodi, klienditugi — kes on midagi tellinud kõikides osakondades, tulevad tiimid ja wipecoding'ivad valmis oma selle asja, mida nad siis tellisid, lähevad valideerivad kliendi peal, intervjueerivad, ja kuni nad jõuavad siis 2 kuuga selle lõpliku tulemuseni. Ja siis lõpus pitchivad seda sellele, nii-öelda, spetsiifilisele meediamaja juhatusele — või isegi võib-olla grupi tasemel — et mis nad siis, nagu, tahavad, või mis on need funktsionaalsused, mis on vajalikud, mis nad on teada saanud juba enda lõppkasutajatega, kes siis on majasisesed või majavälised. Ja siis otsustatakse selle kitchi põhjal, kas see ehitatakse valmis või see ostetakse sisse. Sellepärast, et, noh, personalitarkvara puhul võib-olla on vaja sisse osta. Aga võib-olla, kui sul on onboarding'u tööriist, võib-olla ongi okei, et sa oled — live peale siis — selle valmis teinud, ja see jääbki niimoodi, et majasisesed turvainimesed vaatavad selle üle ja teevad sellele muudatused vastavalt sellele, kuidas vaja on. Aga nende eesmärk on saada parem sisend tellijalt juba. Et see ei ole enam tootejuht, vaid juba tellija peab saama paremaks oma ootuste ja vajaduste kirjeldamisel. Et sa ei võtaks mingisugused bullet point'id copy-paste'ist ChatGPT-st ja ütled — ma tahan seda kõike saada, tahaks jõuluks fondi saada, aga mis see siis täpselt tähendama hakkab? Mis on, ma arvan, väga tervitatav — et see on üks näiteks, nii-öelda, suund, mille kohapealt ma olen väga excited. Ma arvan, et igal pool see niimoodi toimima ei hakka, aga ma arvan, et vibe coding saab olema väga suur osa, nii-öelda, kliendiuuringutest, või peab saama. Täna, ma ei tea, üks suur Eesti teleettevõte on öelnud, et nemad ei võta tootejuhti, kes ei oska vibe-code'ida, enam tööle. Ja nii edasi. Mida see tähendab tegelikult — seda ei tea keegi. Aga peaasjalikult, et sa pead suutma prototüüpida, ja mitte ainult tootejuht ei pea suutma, vaid kõik sinu, nii-öelda, majasisesed stakeholder'id, kes midagi tellivad, nad peaksid suutma süsteemimõtlemist ja disainmõtlemist tegelikult kasutada."}, {"type": "k", "k": "K20", "q": "Kas on midagi, mida sa tahaksid veel lisada, mis jäi käsitlemata?", "a": "Lihtsalt, et kui sa mõtled selle peale, et, nii-öelda, kasutada AI'd ja, nii-öelda, tehispersoonasid, siis mina kasutan täna NotebookLM'i selle jaoks, et ma panen, nagu, teatud spetsiifiliste segmentide või kasutajatüüpide intervjuud kõik NotebookLM'i. Ja pärast minu tootejuhid juba küsivad NotebookLM'i käest, nagu, mingisuguseid küsimusi — ilma selleta, et nad peavad siis intervjueerima minema. Ma ei tea, kas see on see, mida sa otsisid, aga see, nii-öelda, mingil määral me seda tehnoloogiat juba kasutame küll. Aga ma ei luba neil ainult selle pealt. Nad kogu aeg peavad juurde panema sinna neid intervjuusid, et iga asja jaoks nad jälle küsivad mingisuguseid asju ja jälle ei sõidaks seda sama rada."}]}]};
const INTERVIEW_B = {"id": "ai_P1", "label": "P1", "blocks": [{"nr": 1, "title": "SISSEJUHATUS JA TAUST", "tpb": null, "qa": [{"type": "k", "k": "K1", "q": "Kirjelda palun oma ettevõtet – millega see tegeleb ning milline on sinu enda roll ettevõttes.", "a": "Meil on väike külmaseadmete hoolduse ja paigalduse firma, teeme poodidele, kohvikutele ja väiksematele toidutootjatele remonti, hooldusi ja kiireid väljakutseid. Põhimõtteliselt kliendi jaoks on tähtis see, et külm ei jääks seisma, ja meie töö on see mure kiiresti maha võtta. Mina olen omanik ja juhataja, aga päris elus tähendab see, et ma teen natuke kõike: võtan kõnesid vastu, panen töid paika, käin keerulisematel objektidel ise kohal ja vaatan õhtul numbrid üle. Ettevõte on kaheksa aastat vana ja meid on kuus, aga noh, aus pilt on see, et liiga palju käib ikka veel minu kaudu."}, {"type": "k", "k": "K2", "q": "Millised on teie peamised kliendid ja kuidas sa nendega kokku puutud.", "a": "Meie peamised kliendid on ikkagi poed, kohvikud, väiksemad restoranid ja väikesed toidutootjad, kellel on külm lett, külmkamber, joogikülmik või mingi muu asi, mis lihtsalt peab töötama. Nad ei osta meilt mingit ilu või lisavidinat, vaid seda, et nende kaup säiliks ja uksed oleks hommikul lahti, ehk kui külm kaob, siis on kohe jama majas. Ma puutun nendega väga otse kokku, sest üsna tihti vastan ise telefonile, eriti kui asi on kiire või klient on närvis, ja keerulisemate juhtumite puhul lähen ise ka kohale. Palju suhtlust käib ka päeva jooksul sõnumite ja piltide pealt, klient saadab vea, mina küsin paar asja vastu ja siis otsustame, kas saab kohe juhendada või peab tehniku välja saatma. Noh, tegelikult kuulen ma üsna filtreerimata kujul ära ka selle pahameele, kui keegi on pidanud kaks tundi ootama.\n\nÜks hea näide oli eelmisel suvel, kui üks väike kohvik helistas reede õhtul, et koogivitriin on soe ja nädalavahetuse kaup sees. Omanik oli juba üsna paanikas, sest järgmine päev oli neil üritus majas. Ma läksin ise läbi, saime ajutiselt asja tööle, et kaup päästa, ja esmaspäeval tegime korraliku remondi ära. Pärast seda ütles klient üsna otse, et remont on tore, aga tema jaoks on tähtsam, et ta saaks ühe numbri peale helistada ja keegi päriselt reageerib. Sealt tuli meil ka jutt hoolduslepingu peale, sest ma nägin ise ära, et nende mure ei olnud ainult see üks rike, vaid teadmatus, mis siis saab, kui järgmine kord jälle juhtub. Selliseid asju ma kuulen päris tihti ja sealt ma saan ka aru, mida me peame paremaks tegema."}, {"type": "k", "k": "K3", "q": "Kirjelda oma rolli ettevõtte toote või teenuse arendustööde tegemisel ja otsuste tegemisel.", "a": "Minu roll on üsna otse see, et kui meil üldse midagi uut teenuse poolel tekib, siis tavaliselt tuleb see läbi minu laua. Ma kuulan ise klientide kõnesid, käin keerulisematel objektidel kohal ja sealt ma saan päris kiiresti aru, mis asi lonkab, kas reageerimine, hinnastus, hoolduse sisu või lihtsalt see, et kliendile ei ole selge, mida ta tegelikult saab. Meeskonnaga me räägime hommikuti läbi, mis neid närvi ajab või kus töö venib, aga lõplik otsus jääb ikkagi enamasti mulle, sest lõpuks mina vaatan, kas see asi tasub ära ja kas me jõuame seda päriselt välja vedada. Noh, aus pilt on see, et ma tahaks rohkem vastutust jagada, aga kui asi puudutab lubadusi kliendile, siis ma kipun ohjad enda kätte tagasi võtma.\n\nÜks konkreetne näide oli sellega, et meil tuli järjest kurtmist, et kui rike juhtub reede õhtul, siis klient ei saa aru, kas me tuleme kohe või esmaspäeval. Siis ma panin alguses üsna lihtsalt paika, et hoolduslepinguga klientidele anname kindla reageerimisakna ja teistele ütleme kohe telefonis ausalt, mis järjekord on. See ei olnud mingi suur projekt, ma kirjutasin ise tingimused ümber, proovisin paari vana kliendi peal läbi ja vaatasin, kus tekib vaidlus. Esimene versioon oli tegelikult liiga segane, sest kliendid küsisid ikka üle, mis loeb erakorraliseks rikkeks ja mis mitte. Siis tegime selle veel lihtsamaks, praktiliselt inimese keeles, ja pärast seda läks vaidlusi vähemaks ning meil endal ka päevad rahunesid natuke maha. Ehk minu töö arenduses ongi rohkem selline, et ma näen probleemi, proovin mingi lahenduse käiku, vaatan numbreid ja klientide reaktsiooni, ja kui toimib, siis jätame alles."}]}, {"nr": 2, "title": "PRAEGUNE ARENDUSPRAKTIKA", "tpb": "TPB: Behaviour (tegelik käitumine)", "qa": [{"type": "k", "k": "K4", "q": "Mõtle oma ettevõtte tavapärase toote/teenuse arendusele ja kirjelda palun, kuidas see protsess kujuneb algusest lõpuni.", "a": "Meil see ei käi nii, et istume maha ja joonistame mingi ilusa protsessi valmis. Tavaliselt hakkab asi pihta sellest, et sama mure tuleb mitu korda järjest telefonis vastu. Näiteks eelmisel kevadel oli mitu kohvikut ja üks väiksem toidupood, kes helistasid sisuliselt sama jutuga, et suvel läheb koormus suuremaks, külmlett jamab ja siis on paanika, kui asi keset päeva seisma jääb. Sealt mul tekibki mõte, et okei, äkki me ei peaks ootama, kuni asi katki läheb, vaid pakkuma enne hooaja algust kontrolli.\n\nSiis ma vaatan oma vanu töid läbi, arveid, väljakutse põhjuseid, et mis päriselt kordub. Mitte paberil väga peenelt, vaid lihtsalt vaatan, kui palju on olnud lekkeid, ummistunud kondensaatoreid, termostaadi jamasid, selliseid tüüpilisi asju. Siis räägin ühe-kahe tehnikuga autos või hommikul tööde jagamisel, et kuule, kas see on sinu meelest päris mure või ma kujutan ette. Sealt tuleb tavaliselt kohe maa peale tagasi ka, sest nemad ütlevad ära, kui mingi mõte on liiga ilus ja reaalselt aega pole.\n\nKui tundub, et asjal on jumet, siis ma löön õhtul numbrid kokku. Kui kaua üks ennetav kontroll võtaks, mis varuosi võiks vaja minna, kas me saame seda teha nii, et väljakutsete töö ei jää päris seisma. Siis ma ei lähe kohe kõigile seda müüma, vaid pakun kõigepealt mõnele vanale kliendile, kellega on usaldus olemas. Ütlen otse, et teeme proovi, vaatame, kas teil on sellest päriselt kasu.\n\nNii me tegimegi ühe kolme müügikohaga kliendiga. Alguses mõtlesin, et üks hoolduskäik võtab tunni, tegelikult läks esimene kord peaaegu kaks, sest tehnik hakkas juba koha peal asju korda tegema, mida polnud plaanis. Sealt tuli kohe õppetund, et kontroll ja remont tuleb meil pakkumises lahus hoida, muidu me sööme ise oma aja ära. Siis tegime lihtsa ühe lehe kontrollnimekirja, et kõik vaataks enam-vähem samu asju ega teeks igaüks oma tunde järgi.\n\nPärast esimesi käike helistan ma ise kliendile üle ja küsin, kas oli kasu või oli lihtsalt järjekordne arve. Kui klient ütleb, et tal on nüüd kindlam tunne ja suvel oli vähem jama, siis see on minu jaoks märk, et teenust saab edasi ehitada. Kui ta ütleb, et tore küll, aga liiga kallis või ei saanud aru, mille eest maksis, siis tuleb asi ümber teha. Ja noh, päris lõpuni see protsess ei saagi vist kunagi valmis, sest siis hakkab järgmine hooaeg, keegi jääb haigeks, telefon punases, ja sa lappad jälle päeva pealt. Aga kui asi tööle jääb, siis lõpuks paneme selle oma tavapakkumisse sisse, lepime intervalli paika ja proovime teha nii, et klient ei peaks ise kogu aeg meelde tuletama. Ehk meie arendus ongi rohkem selline: päris probleem, väike proov, parandused käigu pealt, ja kui peab vett, siis jääb."}, {"type": "k", "k": "K5", "q": "Kuidas te püüate aru saada, mida kliendid või kasutajad tegelikult vajavad?", "a": "Meil käib see üsna lihtsat moodi, ma ei tee mingeid pikki uuringuid, vaid kuulan ise telefoni, loen sõnumeid ja käin aeg-ajalt objektil kohal, et näha, mis seal päriselt toimub. Väga tihti klient ütleb alguses, et tal on vaja “kohe tehnikut”, aga kui natuke edasi küsida, siis tegelik mure ei ole ainult remont, vaid see, et tema müük ei jääks seisma ja ta teaks, mis kell keegi tuleb. Ma püüan alati küsida, mis hetkel asi katki läks, kui kriitiline see nende tööle on, kas see juhtub esimest korda või juba mitmendat korda, ja siis hakkab pilt tekkima. Noh, vahel saab rohkem teada ka sellest, kuidas klient räägib, mitte ainult sellest, mida ta ütleb.\n\nÜks konkreetne näide oli ühe väikse kohvikuketiga, kellelt tuli meil kogu aeg erakorralisi kõnesid. Nende jutt oli iga kord, et “saatke keegi kiiresti”, aga kui ma ühel objektil ise kohal käisin ja juhatajaga pikemalt rääkisin, siis tuli välja, et neid ajas kõige rohkem närvi hoopis teadmatus: kas keegi tuleb, millal tuleb, kas varuosa on olemas ja kas sama jama kordub kuu aja pärast. Siis me tegime neile hästi lihtsa muudatuse, no õigemini mitu väikest asja korraga: panime paika kindlad hoolduskäigud, lubasime, et anname alati tagasihelistuse kindla aja sees, ja saatsime enne kohale jõudmist sõnumi, mis seis on. Paberil ei tundu see mingi suur leiutis, aga nende poolt kadus päris palju ärevust ära ja meil endal ka, sest paanikakõnesid jäi vähemaks. Ehk ma saan kliendi vajadusest aru siis, kui vaatan tema päeva sisse, mitte ainult seda ühte katkist kappi. Sageli klient ei oska ise ka kohe öelda, mida tal vaja on, ta kirjeldab sümptomi ära, meie asi on siis natuke sügavamale kaevata."}, {"type": "k", "k": "K6", "q": "Kirjelda ühte hiljutist arendamise teekonda algusest kuni arenduse lõpuni.", "a": "Üks hiljutine asi oli meil see, et hakkasin hoolduslepingut päriselt korrastama, mitte lihtsalt suusõnal pakkuma. Asi algas sellest, et mitu sama tüüpi klienti, kohvikud ja väikepoed, helistasid jälle alles siis, kui kapp juba soe ja kaup ohus, ja siis oldi pahased, et miks me kohe ei jõua. Ma vaatasin vanu väljakutseid läbi, rääkisin paari püsikliendiga otse ära, mis neid ärritab, ja panin selle põhjal kokku lihtsa paketi: kindel hooldussagedus, eelisjärjekord rikke puhul ja lühike aruanne pärast käiku. Alguses proovisime seda mõne olemasoleva kliendiga, siis selgus, et liiga keeruline hinnastamine ei tööta, tõmbasin lihtsamaks. Praeguseks see toimib juba täitsa okeilt, meil on rohkem ette planeeritud tööd ja kliendil on ka rahulikum, kuigi noh, päris valmis see asi vist kunagi ei saa."}, {"type": "interv", "k": "K6.täpsustav", "q": "Mis pani sind just siis hoolduslepingut päriselt korrastama?", "a": "See tuli üsna valusalt kätte, mitte mingi suure plaani pealt. Ühel suvel läks meil mitu klienti järjest katki just kõige halvimal ajal, reede õhtul ja nädalavahetusel, ja siis selgus väga selgelt, et osad arvasid, et nad on meil nagu “oma kliendid”, kellele me peame igal hetkel kohe jooksma, aga tegelikult polnud midagi kokku lepitud. Nad olid varem paar korda hoolduse tellinud ja nende peas tähendas see juba püsisuhet, meil jälle tähendas see lihtsalt, et teeme töö ära ja kõik. Sealt hakkas pinge pihta, sest telefon punases, mehi vähe, kõik tahavad esimesena löögile saada, ja mina pidin otsustama, kelle juurde saadan.\n\nMul on üks konkreetne lugu meeles ühest väikesest kohvikust. Neil läks joogikülmik nädalavahetusel soojaks ja omanik helistas väga pahaselt, et “te ju hooldate meid”, aga kui ma pärast arveid vaatasin, siis neil polnud mingit päris kokkulepet, ainult varasemad üksikud väljakutsed. Me ikkagi läksime, sest ma ei tahtnud, et kliendi äri seisma jääks, aga samal ajal pidin ühe teise lepingu-kliendi aega nihutama, mis ei olnud ka õige. Pärast seda õhtul vaatasin numbreid ja sain aru, et nii edasi ei saa, sest me lubame sisuliselt rohkem, kui meil võimekust on.\n\nSiis ma istusin maha ja tegin asja lihtsamaks ja konkreetsemaks: mis hinnaga, mis reageerimisajaga, mida hooldus sisaldab ja mida ei sisalda. Mitte mingi ilusa paberi pärast, vaid et nii kliendil kui meil oleks üheselt aru saada, mille eest ta maksab. Tegelik põhjus oligi see, et ma väsisin sellest vaidlusest, kes mida arvas, ja tahtsin, et meeskond saaks ka ilma minuta paremini otsustada. Täiesti valmis see asi ei ole siiani, noh, ausalt, ikka vajub vahel käigu pealt lappimiseks, aga sealt maalt läks vähemaks seda segadust, kus kõik on justkui tähtsad ja samas keegi pole päriselt kokku lepitud klient."}]}, {"nr": 3, "title": "KLIENDI JA KASUTAJA ROLL ARENDUSES", "tpb": "TPB: Behaviour + Attitude", "qa": [{"type": "k", "k": "K7", "q": "Kuidas teie arendusmeeskond puutub kokku klientidega?", "a": "Meil mingit eraldi arendusmeeskonda tegelikult ei ole, see ongi rohkem nii, et mina ja tehnikud kuuleme kliendi juttu otse töö käigus. Mina vastan palju telefonile, võtan vastu probleemid ja kuulen üsna ruttu ära, kui mingi sama teema hakkab korduma. Tehnikud saavad objektil teise poole kätte, sest seal tuleb välja, kuidas klient seadet kasutab, mis teda ärritab ja kus tal päriselt töö seisma jääb. Siis me räägime omavahel läbi, kas see tähendab, et peab midagi teenuse juures muutma, näiteks kuidas väljakutseid jagame või mida hoolduslepingu sisse paneme. Ehk kontakt kliendiga ei käi meil läbi mingi filtri, vaid üsna otse ja vahel ka päris valusalt."}, {"type": "interv", "k": "K7.1", "q": "Kas arendusmeeskonnal on kunagi otsesuhtlust lõppkasutajaga? Kirjelda.", "a": "Jah, otsesuhtlus on kogu aeg olemas, lihtsalt meil ei nimetata seda kuidagi eraldi. Tehnikud räägivad kohapeal seadme kasutajaga, poe juhataja, koka või vahetusevanemaga, küsivad mis juhtus, millal jamama hakkas ja mis enne tehti. Sealt tuleb tihti palju kasulikumat infot kui ametlikust töötellimusest, sest telefonis räägitakse üks jutt, aga kohapeal selgub, et ust hoitakse lahti või masinat pole ammu puhastatud. Noh, probleem on pigem see, et see teadmine ei jõua alati korralikult tagasi minu või teiste juurde, igaüks lahendab oma otsa ära ja jookseb edasi järgmisele objektile."}, {"type": "k", "k": "K9", "q": "Kirjelda kliendilt tagasiside kogumise protsessi.", "a": "See käib meil üsna otse: klient helistab, kirjutab või ütleb tehnikule kohapeal, mis oli hästi ja mis ajas närvi. Mina korjan selle jutu kokku päevatöö kõrvalt ja kui sama asi kordub, siis proovime töökorralduses midagi muuta."}, {"type": "interv", "k": "K9.1", "q": "Kuidas see sinuni jõuab?", "a": "Enamasti jõuab see minuni väga otse, ei ole mingit filtrit vahel. Kas klient helistab ise närvilise häälega, saadab pildi või video, või siis tehnik ütleb õhtul tagasi jõudes, et kuule, seal kohas ei olnud tegelik mure üldse see, mis telefonis räägiti. Vahel tuleb asi ka ringiga, näiteks raamatupidamisse laekub nurin arve kohta ja sealt on näha, et inimene ei saanud aru, mida me tegime või miks nii kaua läks. Noh, põhimõtteliselt kui sama teema hakkab eri kohtadest korduma, siis ma saan aru, et see ei ole üksik juhus ja sellega peab midagi ette võtma."}, {"type": "interv", "k": "K9.2", "q": "Kuidas te tagasisidet rakendate?", "a": "Meil läheb see rakendamine üsna lihtsa loogika järgi: kui üks klient ütleb midagi, siis ma võtan teadmiseks, aga kui sama jutt hakkab mitmest kohast tulema, siis järelikult on see päris probleem. Siis vaatame, kas asi on töökorralduses, suhtluses või tehniku töös kohapeal, ja proovime kohe midagi muuta, mitte ei jäta kuskile sahtlisse. Näiteks kui tuli korduv kurtmine, et klient ei saa aru, millal tehnik jõuab, siis hakkasime rohkem vahepealseid teavitusi andma, isegi kui täpset kellaaega ei olnud. Kõik ei lähe alati sirgelt, mõni asi jääb pooleli ka, sest päev jookseb peale, aga kui tagasiside puudutab kättesaadavust või seisakuaega, siis sellega me peame tegelema kohe."}]}, {"nr": 4, "title": "SUHTUMINE TEENUSEDISAINI / KASUTAJAKESKSUSESSE", "tpb": "TPB: Attitude + Behavioural Beliefs", "qa": [{"type": "k", "k": "K11", "q": "Millist väärtust sa näed kasutajakeskses lähenemises? Põhjenda oma arvamust.", "a": "Ma näen selle väärtust siis, kui see aitab kliendi päris muret väiksemaks teha, mitte lihtsalt jätab mulje, et teenus on läbimõeldud. Meie puhul tähendab see seda, et kui ma saan aru, kus kliendil töö tegelikult seisma jääb, mis teda närvi ajab ja mida ta ootab näiteks reageerimiselt või hoolduse selguselt, siis saab teenust sättida nii, et vähem on paanikakõnesid ja vähem arusaamatusi. Noh, kliendil ei ole enamasti vaja “lahendust”, tal on vaja, et lett või külmkamber töötaks ja keegi oleks kättesaadav. Kui seda kuulata ja selle järgi tegutseda, siis tuleb rohkem kordustööd ja vähem vaidlust, mis väiksel firmal on päris suur asi."}, {"type": "interv", "k": "K11.täpsustav", "q": "Miks on just reageerimise kiirus ja hoolduse selgus teie klientidele nii määravad?", "a": "Sest meie kliendi jaoks ei ole see mingi mugavusteenus, vaid asi, millest tema enda päevakäive sõltub. Kui kohvikus külmlaud või piimajahuti seisab, siis ei ole küsimus selles, et natuke ebamugav on, vaid kaup läheb halvaks, menüü kukub kokku ja närv läheb kõigil mustaks. Reageerimise kiirus loebki sellepärast, et iga tund maksab neile päriselt raha, mitte piltlikult. Ja hoolduse selgus on sama oluline, sest kui klient ei saa aru, mis me teeme, millal teeme ja mis see maksma läheb, siis ta tunneb, et asi on käest ära.\n\nMul oli üks päris hea näide eelmisest suvest. Üks väike toidupood helistas reede õhtul, külmkamber hakkas sooja viskama ja neil oli nädalavahetuse kaup juba sees. Omanik oli täiesti paanikas, mitte sellepärast, et masin katki oli, vaid sellepärast, et keegi ei olnud talle varasemalt teises firmas ausalt öelnud, kas tullakse, millal tullakse või kas peab juba kauba mujale vedama. Ma ütlesin talle kohe üsna konkreetselt, et meie tehnik jõuab umbes kahe tunni pärast, enne seda proovige ust mitte lahti teha ja kui temperatuur läheb üle selle piiri, hakake kõige kallimat kaupa ümber tõstma. Kohapeal selgus, et viga ei olnudki kõige hullem, aga see, mis klient pärast välja tõi, ei olnud isegi remont ise, vaid see, et tal oli esimest korda tunne, et keegi juhib olukorda.\n\nNoh, sellest ma sain veel kord kinnitust, et inimesed taluvad halba uudist paremini kui segadust. Kui ütled otse, mis seis on, mis järgmine samm on ja mis võib valesti minna, siis nad lepivad palju rahulikumalt ka kuluga. Kui sa aga venitad, lubad umbmääraselt või jätad inimese teadmatusse, siis pahameel tuleb kiiremini kui arve. Meie äris ostetakse lõpuks kindlustunnet sama palju kui parandust."}, {"type": "k", "k": "K12", "q": "Millised on sinu meelest kasutajakeskse lähenemise kitsaskohad või piirangud?", "a": "Suur piirang on minu meelest see, et klient ütleb tihti ära ainult oma tänase häda, mitte selle, mis tal päriselt pikemalt katki on. Kui ma kuulaks ainult seda, mida kõige kõvemini telefonis nõutakse, siis me jooksekski ainult reede õhtu väljakutseid ja lubaks kõigile “kohe tuleme”, aga reaalselt ei vea see ei inimesi ega raha välja. Teine asi on see, et kõik kliendid ei ole võrdselt mõistlikud tagasiside andjad: mõni karjub ühe väikse asja pärast kõvemini kui viis rahulikku klienti, kellel on tegelikult sama mure, aga nad sõnastavad seda normaalselt. Siis on oht hakata otsuseid tegema emotsiooni pealt.\n\nÜks konkreetne näide oli meil väikeste kohvikutega, kes tahtsid, et oleks ööpäev läbi reageerimine, aga samal ajal ei tahtnud sisuliselt hoolduslepingu eest maksta. Alguses püüdsime kõigile vastu tulla, sest noh, kliendi soov ju, ja tulemus oli see, et poisid väsisid ära, mina olin kogu aeg telefoni otsas ja päris head kliendid jäid vahel ootele. Sealt ma sain aru, et ainult kliendi jutu järgi joonduda ei saa, peab vaatama ka, mis on meile tehtav ja mis päriselt aitab tal seisakut vältida. Mõnikord klient tahab kiiret plaastrit, aga tal oleks vaja hoopis regulaarset hooldust või selgemat kokkulepet. Ehk siis kasutaja kuulamine on vajalik, aga kui sul endal selgroogu ja piire ei ole, siis see keerab teenuse lõpuks laiali. Meie puhul peab asi ikkagi töötama mõlemat pidi, kliendile kasu ja meile teostatav."}]}, {"nr": 5, "title": "SOTSIAALSED JA PROFESSIONAALSED MÕJUTAJAD", "tpb": "TPB: Subjective Norm", "qa": [{"type": "k", "k": "K13", "q": "Kuidas sinu meeskond/kolleegid suhtuvad kasutajakesksesse lähenemisse ja miks?", "a": "Kui sa mõtled selle all seda, et ei vaata ainult masinat, vaid kuulad ära ka inimese, kes sellega iga päev jamab, siis mu meeskond saab sellest põhimõttest tegelikult aru küll. Nad ei ütle seda mingi uhke sõnaga, aga enamik näeb ära, et kui kasutaja jutt läbi kuulata, saab tihti kiiremini päris vea kätte ja pärast on vähem edasi-tagasi sõitmist. Samas, noh, tehnik on tehnik — talle meeldib asi ära parandada, mitte pikalt küsitleda, ja kiirel päeval kipub see inimeste pool tahaplaanile jääma. Eriti hooajal, kui telefon põleb, siis mõni mõtleb, et “ütle, kus seade on, ma tulen ja teen ära”, mitte et hakkaks uurima, kuidas seda kasutatakse või mis enne juhtus.\n\nÜks päris hea näide oli meil ühe väikse poe joogikülmikuga. Käisime seal kaks korda järjest, vahetasime juppe ja asi nagu töötas, aga paari päeva pärast oli jälle soe sees. Kolmandal korral ma ise läksin kaasa ja küsisin müüjalt täpsemalt, mis hetkel see jama tekib, ja tuli välja, et õhtuti lükati kastid õhuvõtu ette, sest laos polnud ruumi. Ehk rike polnud ainult seadmes, vaid kasutuses ka. Pärast seda ma ütlesin poistele üsna otse, et enne kui hakkad kohe kruvikeerajaga kallale minema, küsi kolm-neli lolli küsimust ära. Mõni algul torises, et see on ajaraisk, aga kui pärast jäi üks asjatu väljakutse ära, siis saadi aru küll, miks see oluline on. Nii et suhtumine on selline, et põhimõtteliselt ollakse poolt, aga seda tuleb kogu aeg meelde tuletada, sest töötempo sööb selle harjumuse ruttu ära."}, {"type": "k", "k": "K14", "q": "Kuidas juhtkond suhtub klientide kaasamisse arendusotsuste tegemisel? Miks?", "a": "Meil see “juhtkond” olen suures osas mina ise, ja ma suhtun sellesse nii, et klienti peab kuulama päris palju, muidu hakkad omaette targaks minema ja teed valet asja. Kuna mina kuulen neid kõnesid ja pahandamist otse, siis ma tean üsna hästi, kust king pigistab, eriti kui sama mure tuleb mitmelt poolt. Samas ma ei arva, et klient peab arendusotsuse ise ära tegema, sest tema näeb oma tänast häda, mina pean vaatama ka töökoormust, raha ja seda, kas me suudame lubatu välja vedada. Ehk kaasame küll, aga lõpliku valiku teen mina selle järgi, mis päriselt töötab, mitte mis hetkel kõige kõvemini kõlab."}, {"type": "k", "k": "K15", "q": "Kuidas on sinu suhtumist või praktikaid mõjutanud laiem ettevõtluskeskkond, näiteks kiirendid, mentorid, sarnased ettevõtted või konkurendid? Miks?", "a": "Mingid kiirendid ja sellised asjad, noh, nendega mul päris kokkupuudet ei ole olnud, mul ei ole ausalt aega käia kuskil päev otsa juttu kuulamas, kui telefon samal ajal taskus põleb. Rohkem on mind mõjutanud teised samas valdkonnas tegijad, kliendid ise ja paar tuttavat ettevõtjat, kellega vahel räägime, et mis kellel töötab ja mis ei tööta. Konkurente ma vaatan just selle pilguga, et mida nad lubavad ja mille pealt nad kliente ära võtavad, sest sealt näeb kiiresti ära, kus sul endal logiseb. Üks konkreetne lugu oli nii, et üks väike poekett, keda me olime aastaid juhutööna teenindanud, läks vahepeal teise tegija peale üle, sest neil oli paberil selgem hoolduspakett ja lubatud reageerimisaeg kirjas. Klient ütles mulle otse välja, et hind ei olnudki põhiline, vaid nad tahtsid kindlust, et ei pea iga kord nullist helistama ja seletama, kes nad on ja mis neil katki on. See lõi mul korraks jalad alt ära, sest ma teadsin, et tehniliselt me tegime töö ära, aga teenuse pool oli laiali. Pärast seda ma istusin õhtuti ja panin oma hoolduslepingud palju konkreetsemaks, kes saab mis ajaga reageerimise, mida me kontrollime ja kuidas info kirja läheb. Üks tuttav, kes teeb teises tehnilises valdkonnas hooldust, ütles ka üsna lihtsalt, et ära müü ainult remonti, müü rahu, ja see tegelikult jäi kummitama. Nii et mind ei ole mõjutanud mingi ilus teooria, vaid see, kui näen kõrvalt, et keegi teeb mõne asja sirgemalt ja klient saab sellest kohe aru. Eks see põhjus ongi lihtne: väikesel firmal ei ole luksust õppida väga kallilt, tavaliselt õpid siis, kui klient läheb või peaaegu läheb."}, {"type": "k", "k": "K16", "q": "Kas sul on olnud formaalne kokkupuude teenusedisaini metoodikaga, koolitused, programmid, meistriklassid vms?", "a": "Ei, formaalselt mul sellega kokkupuudet olnud ei ole. Ma ei ole käinud teenusedisaini koolitustel ega mingites programmides, kus seda eraldi õpetatakse; pigem on olnud tehnilised koolitused seadmete, külmaine või tootjate lahenduste kohta. See, kuidas me teenust paremaks teeme, on tulnud rohkem telefoni otsast, objektilt ja teiste väikeste tegijatega rääkides, mitte klassiruumist. Kui keegi näitaks midagi, mis aitaks meil päriselt paremini tööd korraldada ja vähem tulekahjusid kustutada, siis ma ei ole sellele vastu, aga niisama moe pärast ma kuskile ei lähe."}, {"type": "interv", "k": "K16.1", "q": "K16.1 Kuidas see on sinu praktikat mõjutanud?", "a": "See on mõjutanud nii, et ma teen asju rohkem kõhutunde, kliendi jutu ja oma kogemuse pealt, mitte mingi etteantud mudeli järgi. Hea pool on see, et ma liigun kiiresti ja ei jää liiga pikalt arutama, kui on näha, et mingi asi klienti päriselt häirib. Halb pool on jälle see, et me leiutame vahel ise jalgratast ja mõned asjad jõuavad korda teha alles siis, kui probleem on juba mitu korda vastu pead andnud. Ehk siis praktika on hästi vahetu, aga mitte alati süsteemne."}, {"type": "interv", "k": "K16.täpsustav", "q": "Miks on see areng tulnud pigem praktikast ja vestlustest, mitte koolitustelt?", "a": "Sest mul on vaja lahendada päris probleem täna, mitte siis, kui koolitus läbi saab. Enamiku kasulikust olen saanud klientide kõnedest, tehnikute jutust ja teiste tegijatega rääkides."}]}, {"nr": 6, "title": "VÕIMEKUS JA BARJÄÄRID", "tpb": "TPB: Perceived Behavioural Control", "qa": [{"type": "k", "k": "K17", "q": "Kirjelda ühte olukorda, kus oleksid tahtnud klienti rohkem kaasata, aga see ei õnnestunud. Mis sai takistuseks ja miks?", "a": "Ühe kohviku puhul tahtsin enne hoolduslepingu paika panemist nendega rahulikult läbi käia, mis masinad neil päriselt kriitilised on ja mis kelladel risk kõige suurem on. See jäi ära, sest neil oli kogu aeg kiire ja meil endal samamoodi, nii et lõpuks tehti jälle lihtsalt tulekahju kustutamist."}, {"type": "interv", "k": "K17.1", "q": "Millised ressursid või tingimused puudusid?", "a": "Põhiliselt puudus aeg, ja mitte see teoreetiline “peaks kalendrisse võtma”, vaid päriselt selline aeg, kus telefon ei helise ja keegi ei oota kohe vastust. Selle sama kohviku näite puhul oli mul mõte, et istume omanikuga tunniks maha, vaatame kõik seadmed üle, paneme kirja, mis neist on kriitiline ja mis võib oodata, et saaks hoolduslepingu normaalselt paika. Aga reaalsus oli see, et neil oli endal pidev jooks peal, meil samal ajal kaks avariikutset, ja see rahulik arutamine jäi kolm korda edasi lükatud ja lõpuks jäigi tegemata. Siis puudus ka inimene, kes selle asja lõpuni veaks, kui mina ise parasjagu kuskil objektil või roolis olen. Ma võin alguse ära teha, aga kui keegi teine seda kokku ei kogu, siis vajub laiali.\n\nTeine asi oli info ühes kohas koos hoidmine. Osa juttu tuli telefonis, osa tehniku kaudu, osa sõnumites, ja pärast õhtul proovi sellest pilt kokku panna. Noh, saad küll mingi ettekujutuse, aga see on väsitav ja poolik. Ja ausalt, natuke jäi puudu ka kliendi enda valmisolekust aeg maha võtta, sest tema mõtleb samamoodi nagu meie: tee asi korda ja lähme edasi. Alles siis, kui neil üks joogikülmik laupäeva hommikul maha kukkus ja müük sai pihta, oldi valmis rahulikult rääkima. Ehk tingimus, mis puudu oli, oligi see hetk, kus mõlemal poolel oleks ruumi enne mõelda, mitte alles pärast jama."}, {"type": "interv", "k": "K17.2", "q": "Millised takistused on praegusel hetkel veel alles?", "a": "Põhilised takistused on ikka aeg, inimesed ja see, et kõik jookseb minu laua peale kokku. Tahaks asju rahulikult paremaks teha, aga päev läheb ära tulekahjude kustutamisele."}]}, {"nr": 7, "title": "TULEVIKUVAADE JA KAVATSUSED", "tpb": "TPB: Intention", "qa": [{"type": "k", "k": "K18", "q": "Kuidas soovid muuta tänast protsessi kliendi kaasamise vaates järgmistes arendustöödes?", "a": "Ma tahaks seda muuta nii, et me ei kuuleks klienti ainult siis, kui tal on juba närv must ja asi seisab, vaid võtaksime paar olulist klienti varem jutule, enne kui midagi ümber teeme. Ehk kui uut hoolduslepingu osa või töökorralduse muudatust proovime, siis räägiks selle enne läbi kahe-kolme päriskliendiga, kes meid ausalt paika panevad. Teine asi on see, et tehnikud peaksid ühtlasemalt tagasi ütlema, mis kohapeal kordub, mitte et info jääb kellegi pähe kinni. Ma ei taha mingit pikka paberimajandust, aga natuke süsteemsemaks peaks selle saama, muidu ma otsustan jälle õhtul üksi ja poole info pealt."}, {"type": "interv", "k": "K18.1", "q": "Milliseid konkreetseid tegevusi oled juba alustanud või planeerinud?", "a": "Ma olen juba alustanud sellega, et panen korduvad mured natukenegi ühte kohta kirja, mitte ei hoia kõike ainult peas või telefonikõnede najal. Näiteks hoolduslepingute puhul tahan teha paar selget paketti, et klient saaks kohe aru, mis sees on ja mis ei ole, sest praegu läheb see liiga tihti vaidluseks siis, kui jama on juba käes. Plaanis on ka see, et võtame mõne püsikliendiga enne hooaja algust ise ühendust, küsime läbi, mis neil kriitilised seadmed on ja mis ajad on kõige hullemad. Ja seespool tahaks tööde jagamise sirgemaks saada, et iga asi ei jõuaks lõpuks minu kätte tagasi, kuigi noh, see on seni kõige vaevalisem osa olnud."}, {"type": "interv", "k": "K18.täpsustav", "q": "Miks teie meelest seni klientidega enne muudatusi piisavalt vara ei räägita?", "a": "Põhjus on üsna lihtne: me räägime kliendiga kõige rohkem siis, kui tuli juba põleb. Igapäevatöös on kogu aeg mingi väljakutse, keegi ootab pakkumist, kuskil seade seisab, ja siis see varasem rahulik läbiarutamine lükatakse edasi, kuni enam ei jõua. Teine asi on see, et ma ise ka kipun mõtlema, et ah, saan oma kogemuse pealt enam-vähem aru, mis neile vaja on, ja alles hiljem tuleb välja, et mõni oluline nüanss jäi küsimata. Ja noh, klient ise ka ei taha alati enne aega võtta, tal on oma töö ees."}, {"type": "k", "k": "K20", "q": "Suur aitäh sinu aja ja mõtete eest! Kas on midagi, mida sa tahaksid veel lisada, mis jäi käsitlemata?", "a": "Võib-olla seda lisaks, et väikse firma puhul ei tasu eeldada, et me nimetame neid asju ilusate sõnadega või teeme neid kuidagi kooliõpiku järgi. Me teeme paljusid asju tegelikult ära, lihtsalt käigu pealt: kuulame klienti, proovime midagi väikselt, muudame, kui ei tööta. Suur häda on see, et hea mõte kaob tihti päevatöö alla ära, sest keegi peab samal ajal telefonile vastama ja objektile jõudma. Kui tahta, et sellised ettevõtted päriselt oma teenust paremaks teeksid, siis see peab olema hästi lihtne, ajaliselt lühike ja päris tööga kokku käiv, muidu see jääbki tegemata."}]}]};
const RATING_STATEMENTS = {"2": {"title": "Käitumine ja arenduspraktika", "items": [["2.1", "Intervjueeritav kirjeldab oma praegust arendus- või otsustusprotsessi piisavalt detailselt."], ["2.2", "Vastused sisaldavad konkreetseid näiteid, numbreid või situatsioonikirjeldusi, mitte ainult üldistusi."], ["2.3", "Intervjueeritav räägib oma isiklikust kogemusest, mitte üldistest tõdedest."]]}, "3": {"title": "Kliendi kaasamine ja tagasiside", "items": [["3.1", "Intervjueeritav toob konkreetseid näiteid olukordadest, kus kliendi sisend mõjutas otsuseid."], ["3.2", "Intervjuust selgub, kuidas tagasiside kogumine ja rakendamine praktiliselt toimub."], ["3.3", "Vastused tunduvad loomulikud ja elulähedased."]]}, "4": {"title": "Hoiakud (Attitude)", "items": [["4.1", "Intervjueeritav väljendab selgelt oma suhtumist kasutajakesksesse lähenemisse (positiivne, negatiivne või ambivalentne)."], ["4.2", "Intervjueeritav toob välja konkreetseid põhjuseid, miks ta kasutajakeskset lähenemist väärtustab või ei väärtusta."], ["4.3", "Intervjueeritav kirjeldab kasutajakeskse lähenemise tajutud kasu või kahju oma ettevõtte kontekstis."]]}, "5": {"title": "Subjektiivsed normid (Subjective Norm)", "items": [["5.1", "Intervjuust selgub, kuidas meeskond, kolleegid või juhtkond suhtuvad kasutajakesksesse lähenemisse."], ["5.2", "Intervjueeritav kirjeldab väliseid mõjutajaid (konkurendid, mentorid, koolitused, valdkond), mis on tema praktikaid kujundanud."], ["5.3", "Intervjuust tuleb välja, kas klientide kaasamine toimub sisemisest soovist või välisest survest."]]}, "6": {"title": "Tajutud käitumiskontroll (Perceived Behavioural Control)", "items": [["6.1", "Intervjueeritav nimetab konkreetseid takistusi, mis piiravad kasutajakeskse lähenemise rakendamist (aeg, raha, oskused, struktuur vms)."], ["6.2", "Intervjueeritav kirjeldab tegureid, mis soodustavad või toetavad kasutajakeskset lähenemist tema ettevõttes."], ["6.3", "Intervjueeritav annab hinnangu oma võimekusele kasutajakeskseid praktikaid rakendada."]]}, "7": {"title": "Kavatsus ja tulevikuvaade (Intention)", "items": [["7.1", "Intervjueeritav väljendab kavatsusi tuleviku osas – kas ja kuidas ta soovib oma praktikat muuta."]]}, "8": {"title": "Vastuste loomulikkus ja kvaliteet", "items": [["8.1", "Intervjueeritav kasutab keelt, mis sobib tema rolli ja valdkonnaga (sh slängi, valdkonnakeelt, kõnekeelt)."], ["8.2", "Intervjueeritava vastused on omavahel kooskõlas – varasemad vastused ei ole vastuolus hilisematega."], ["8.3", "Intervjuus esineb ootamatuid vaatenurki või teemasid, mida intervjueerija otseselt ei küsinud."], ["8.4", "Vastaja kõnes ilmneb seisukohtade ebakindlus, kõikumine või sisemine pinge."]]}, "9": {"title": "Koondhinne", "items": [["9.1", "Kokkuvõttes annab see intervjuu väärtuslikku sisendit kasutajakesksete praktikate uurimiseks."], ["9.2", "See intervjuu tundub nagu vestlus päris inimesega."]]}};
const PAIR_NR = 1;

// Randomize order
const orderFlip = Math.random() < 0.5;
const INTERVIEWS = orderFlip ? [INTERVIEW_B, INTERVIEW_A] : [INTERVIEW_A, INTERVIEW_B];
const ORDER_LABEL = orderFlip ? "B_first" : "A_first";

const state = {
    step: "intro",
    consent: null,
    ratings: {},
    feedback: {},
    startTime: Date.now(),
    order: ORDER_LABEL,
    pair: PAIR_NR
};

function el(tag, attrs = {}, ...children) {
    const e = document.createElement(tag);
    for (const [k, v] of Object.entries(attrs)) {
        if (k === "class") e.className = v;
        else if (k === "html") e.innerHTML = v;
        else if (k.startsWith("on")) e.addEventListener(k.slice(2), v);
        else e.setAttribute(k, v);
    }
    for (const c of children) {
        if (typeof c === "string") e.appendChild(document.createTextNode(c));
        else if (c) e.appendChild(c);
    }
    return e;
}

function clearContent() { document.getElementById("content").innerHTML = ""; }

function renderProgress(text, percent) {
    const c = document.getElementById("progress-container");
    c.innerHTML = `<div class="progress">${text}<div class="progress-bar"><div class="progress-bar-fill" style="width:${percent}%"></div></div></div>`;
}

function escapeHtml(s) {
    if (s == null) return "";
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

// === Step 1: Intro + Consent ===
function renderIntro() {
    state.step = "intro";
    clearContent();
    renderProgress("Samm 1/4 — Sissejuhatus", 10);
    const root = document.getElementById("content");
    root.appendChild(el("div", { class: "card", html: `
        <h1>Intervjuude hindamise uuring</h1>
        <p><strong>Tere!</strong></p>
        <p>Suur tänu, et oled nõus selles uuringus osalema. Käesolev uuring on osa minu magistritööst.</p>
        <p>Sulle esitatakse kaks intervjuu transkriptsiooni, mis käsitlevad teenusedisaini ja kasutajakesksete praktikate kasutuselevõttu Eesti ettevõtetes. Sinu ülesanne on lugeda mõlemad intervjuud läbi ja hinnata nende sisu erinevaid aspekte 5-pallisel skaalal.</p>
        <div class="notice">
            <strong>NB!</strong> Ära otsi "õigeid" vastuseid — hinda oma sisetunde järgi, kuidas need vastused sulle mõjuvad.
        </div>
        <p>Intervjuud on jaotatud teemaplokkideks (PLOKK 1 kuni PLOKK 7). Iga ploki all on küsimused ja vastused, millele järgneb hindamisskaala.</p>
        <p><strong>Tähtis:</strong> Loe iga plokk hoolikalt läbi ja hinda kohe selle all olevat skaalat, kui info on värskelt meeles.</p>
        <h3>Ajakulu</h3>
        <p>Kogu uuring võtab orienteeruvalt 30–45 minutit.</p>
        <h3>Nõusolek</h3>
        <p>Osalemine on vabatahtlik ja anonüümne. Sinu vastuseid kasutatakse ainult teaduslikel eesmärkidel.</p>
        <div class="consent-options">
            <label><input type="radio" name="consent" value="yes"> Olen nõus osalema</label>
            <label><input type="radio" name="consent" value="no"> Ei soovi osaleda</label>
        </div>
    `}));
    const btn = el("button", { class: "btn", onclick: handleConsent }, "Edasi");
    root.appendChild(btn);
}

function handleConsent() {
    const sel = document.querySelector('input[name="consent"]:checked');
    if (!sel) { alert("Palun vali üks variant."); return; }
    if (sel.value === "no") {
        clearContent();
        renderProgress("", 0);
        document.getElementById("content").appendChild(el("div", { class: "card", html: `
            <h1>Aitäh!</h1>
            <p>Kahju, et seekord ei osale. Kui muudad meelt, võid alati lehe uuesti avada.</p>
        `}));
        return;
    }
    state.consent = "yes";
    renderInterview(0);
}

// === Render Interview ===
function renderInterview(idx) {
    state.step = "interview_" + idx;
    clearContent();
    const stepNum = idx === 0 ? 2 : 3;
    renderProgress(`Samm ${stepNum}/4 — Intervjuu ${idx + 1}/2`, 25 + idx * 35);
    const interview = INTERVIEWS[idx];
    const root = document.getElementById("content");

    root.appendChild(el("div", { class: "card", html: `
        <p class="meta">Intervjuu ${idx + 1} / 2</p>
        <h1>Järgneb intervjuu transkriptsioon</h1>
        <p>Loe iga plokk hoolikalt läbi ja hinda kohe selle all olevat skaalat, enne kui järgmisesse plokki liigud.</p>
        <p>Intervjuu on jaotatud 7 plokiks. Esimene plokk (sissejuhatus ja taust) on ilma hindamiseta — loe lihtsalt läbi.</p>
    `}));

    interview.blocks.forEach(block => {
        const card = el("div", { class: "card" });
        card.innerHTML = `
            <p class="meta">Plokk ${block.nr} / 7</p>
            <h2>PLOKK ${block.nr}. ${escapeHtml(block.title)}</h2>
            ${block.tpb ? `<p class="tpb">${escapeHtml(block.tpb)}</p>` : ""}
        `;
        block.qa.forEach(qa => {
            if (qa.type === "k") {
                const div = el("div", { class: "qa" });
                div.innerHTML = `
                    <p class="question"><strong>${escapeHtml(qa.k)}:</strong> ${escapeHtml(qa.q)}</p>
                    <p class="answer"><strong>Vastaja:</strong> ${escapeHtml(qa.a)}</p>
                `;
                card.appendChild(div);
            } else {
                const div = el("div", { class: "qa intervjueerija" });
                div.innerHTML = `
                    <p class="question"><strong>${escapeHtml(qa.k)}:</strong> ${escapeHtml(qa.q)}</p>
                    <p class="answer"><strong>Vastaja:</strong> ${escapeHtml(qa.a)}</p>
                `;
                card.appendChild(div);
            }
        });

        if (block.nr >= 2 && block.nr <= 7) {
            const ratingBox = renderRatingBox(idx, interview.id, block.nr);
            card.appendChild(ratingBox);
        }
        root.appendChild(card);
    });

    // Block 8 — quality + block 9 — overall
    const generalCard = el("div", { class: "card" });
    generalCard.innerHTML = `
        <p class="meta">Intervjuu kvaliteet ja üldmulje</p>
        <h2>PLOKK 8. Vastuste loomulikkus ja kvaliteet</h2>
        <p>Selles plokis hindad intervjuu üldist kvaliteeti terves ulatuses.</p>
    `;
    generalCard.appendChild(renderRatingBox(idx, interview.id, 8));
    generalCard.appendChild(renderRatingBox(idx, interview.id, 9));
    root.appendChild(generalCard);

    // Block 9 — open questions
    const textCard = el("div", { class: "card" });
    textCard.innerHTML = `
        <p class="meta">Lahtised küsimused</p>
        <h2>PLOKK 9. Lahtised küsimused</h2>
        <p>Palun vasta lühidalt järgmistele küsimustele. Vabatekstid on vabatahtlikud, kuid väga abiks.</p>
        <div class="form-field">
            <label>9.3 — Kas midagi tundus selles intervjuus ebatavaline, tehislik või ebaloomulik? Kui jah, siis mis täpselt?</label>
            <textarea id="feedback-${idx}-93" rows="4"></textarea>
        </div>
        <div class="form-field">
            <label>9.4 — Mis oli selle intervjuu kõige tugevam koht? Mis oli kõige nõrgem?</label>
            <textarea id="feedback-${idx}-94" rows="4"></textarea>
        </div>
        <div class="form-field">
            <label>9.5 — Kui peaksid pakkuma, kas see intervjuu on tehtud päris inimesega või tehisintellektiga, siis kumba sa arvaksid? Miks?</label>
            <textarea id="feedback-${idx}-95" rows="4"></textarea>
        </div>
    `;
    root.appendChild(textCard);

    // Button
    const btnCard = el("div", { class: "card" });
    const errDiv = el("div", { id: `interview-error-${idx}` });
    btnCard.appendChild(errDiv);
    const btn = el("button", {
        class: "btn",
        onclick: () => validateAndContinue(idx)
    }, idx === 0 ? "Edasi teise intervjuu juurde →" : "Edasi kokkuvõttesse →");
    btnCard.appendChild(btn);
    root.appendChild(btnCard);
    window.scrollTo(0, 0);
}

function renderRatingBox(interviewIdx, interviewId, blockNr) {
    const blockData = RATING_STATEMENTS[String(blockNr)];
    if (!blockData) return el("div");
    const box = el("div", { class: "rating-box" });
    box.innerHTML = `<h4>✏️ HINDAMINE: ${escapeHtml(blockData.title)}</h4><p class="scale-info">Skaala: 1 = ei nõustu üldse · 2 = pigem ei nõustu · 3 = nii ja naa · 4 = pigem nõustun · 5 = nõustun täielikult</p>`;
    blockData.items.forEach(([code, text]) => {
        const item = el("div", { class: "rating-item" });
        const rName = `r_${interviewIdx}_${interviewId}_${code}`;
        item.innerHTML = `
            <p><strong>${code}</strong> — ${escapeHtml(text)}</p>
            <div class="rating-scale">
                ${[1,2,3,4,5].map(v => `<label><input type="radio" name="${rName}" value="${v}"><span class="num">${v}</span></label>`).join("")}
            </div>
        `;
        box.appendChild(item);
    });
    return box;
}

function validateAndContinue(idx) {
    const interview = INTERVIEWS[idx];
    // Collect ratings
    const missing = [];
    [2,3,4,5,6,7,8,9].forEach(blockNr => {
        const blockData = RATING_STATEMENTS[String(blockNr)];
        if (!blockData) return;
        blockData.items.forEach(([code, _]) => {
            const rName = `r_${idx}_${interview.id}_${code}`;
            const sel = document.querySelector(`input[name="${rName}"]:checked`);
            if (sel) {
                state.ratings[`${interview.id}_${code}`] = parseInt(sel.value);
            } else {
                missing.push(code);
            }
        });
    });

    // Collect feedback
    ["93","94","95"].forEach(q => {
        const ta = document.getElementById(`feedback-${idx}-${q}`);
        if (ta && ta.value.trim()) {
            state.feedback[`${interview.id}_${q}`] = ta.value.trim();
        }
    });

    if (missing.length > 0) {
        const errDiv = document.getElementById(`interview-error-${idx}`);
        errDiv.innerHTML = `<div class="error-msg">Palun hinda kõik väited. Puudu on: ${missing.join(", ")}</div>`;
        return;
    }

    if (idx === 0) {
        renderInterview(1);
    } else {
        submitResults();
    }
}

async function submitResults() {
    clearContent();
    renderProgress("Samm 4/4 — Saatmine", 95);
    const root = document.getElementById("content");
    root.appendChild(el("div", { class: "card", html: `<h1>Saadan vastuseid...</h1><p>Palun oota hetk.</p>` }));

    const payload = {
        pair: state.pair,
        order: state.order,
        interview_1_id: INTERVIEWS[0].id,
        interview_2_id: INTERVIEWS[1].id,
        ratings: state.ratings,
        feedback: state.feedback,
        duration_sec: Math.round((Date.now() - state.startTime) / 1000),
        timestamp: new Date().toISOString()
    };

    try {
        const resp = await fetch(FORMSPREE_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json", "Accept": "application/json" },
            body: JSON.stringify(payload)
        });
        if (resp.ok) {
            renderThankYou();
        } else {
            throw new Error("Server error: " + resp.status);
        }
    } catch (err) {
        clearContent();
        renderProgress("Viga", 95);
        document.getElementById("content").appendChild(el("div", { class: "card", html: `
            <h1>Viga saatmisel</h1>
            <div class="error-msg">${escapeHtml(err.message)}</div>
            <p>Palun proovi uuesti või võta uurijaga ühendust.</p>
            <pre style="font-size:11px;overflow:auto;max-height:200px">${escapeHtml(JSON.stringify(payload, null, 2))}</pre>
        `}));
    }
}

function renderThankYou() {
    clearContent();
    renderProgress("Valmis!", 100);
    document.getElementById("content").appendChild(el("div", { class: "card", html: `
        <h1>Aitäh osalemise eest!</h1>
        <div class="success-msg"><strong>Sinu vastused on edukalt saadetud.</strong></div>
        <p>Sinu hinnangud aitavad oluliselt kaasa minu magistritöö valmimisele.</p>
        <p>Kui sul on küsimusi uuringu kohta või soovid teada tulemusi, võid minuga ühendust võtta.</p>
        <p style="margin-top: 32px;"><strong>Veel kord suur aitäh!</strong><br>Katrin Primak</p>
    `}));
}

renderIntro();
</script>
