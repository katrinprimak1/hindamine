<script>
const FORMSPREE_URL = "https://formspree.io/f/mvzdggww";
const INTERVIEW_A = {"id": "real_Berit", "label": "Berit", "blocks": [{"nr": 1, "title": "SISSEJUHATUS JA TAUST", "tpb": null, "qa": [{"type": "k", "k": "K1", "q": "Kirjelda palun oma ettevõtet – millega see tegeleb ning milline on sinu enda roll ettevõttes.", "a": "Ma kirjeldaks siinkohal kahte ettevõtet, kuna mõlemad on relevantsed. Üks ettevõte arendab infrastruktuuri AI-platvormi, kelle siis lõppkasutajaks võiks olla Ameerika healteki engineering tiimid. Ja minu ülesanne on põhimõtteliselt operatsioonide juhtimine ja siis müük ja ka kliendiintervjuud ja, noh, ta on nagu start-up, seega tuleb kõike teha, mis vaja teha on. Teine ettevõte on raamatupidamistarkvara ettevõte, kus me oleme tegelikult tarkvara arendusega tegelenud pikemalt ja seal ma olen samuti kaasasutaja rollis."}, {"type": "k", "k": "K2", "q": "Millised on teie peamised kliendid ja kuidas sa nendega kokku puutud.", "a": "AI-platvormi puhul oleme prototüübi faasis. Meil on mõned maksvad kliendid ja need on tulnud, nii-öelda, läbi eelnevate isiklike tutvuste. Ehk siis kus juba ise oleme nagu sees olnud. Kliendid on enamasti USA või Skandinaavia healteki ettevõtted. Kokkupuude on kõik remote, et veebikohtumised, e-mailid ja siis hästi palju meie valdkond levib nagu mouth to mouth, et keegi soovitab, siis see viib meid omavahel meilis kokku ja siis me selles mõttes saame nagu uue leadi."}, {"type": "k", "k": "K3", "q": "Kirjelda oma rolli ettevõtte toote või teenuse arendustööde tegemisel ja otsuste tegemisel.", "a": "See on hästi keeruline, sest et mis ärimudel peaks olema, kes peaks see lõplik persona olema, kellele me müüme, et see on hästi keeruline. Kuna see vajadus on tulnud nagu iseenda, nii-öelda, nägemusest või vajadusest ja siis see probleemi leidmine, siis minu ülesanne ongi olnud tagasisidestada mitte seda toote tehnilist osa, vaid just seda kasutaja osa. Et ma küsin kliendi käest, et kuidas tema seda kasutaks, kas tal üldse on vaja seda, mis ta oleks nõus selle eest maksma. Et kõik need on need kliendiintervjuu küsimused ja siis need ma viin tagasi, nii-öelda, tiimi ja siis tiimiga koos me planeerime neid strateegiaid. Aga noh, tehnilise osa pealt, kuna see on puhas engineering toode, siis seal need kolleegid on nagu fännid ja nad arendavad hästi palju tegelikult ka selliseid asju, mida ei ole kliendil võib-olla vaja. On nagu need nice-to-have'id, et seal neid, nii-öelda, entusiaaste peatada ei saa."}]}, {"nr": 2, "title": "PRAEGUNE ARENDUSPRAKTIKA", "tpb": "TPB: Behaviour (tegelik käitumine)", "qa": [{"type": "k", "k": "K4", "q": "Mõtle oma ettevõtte tavapärase toote/teenuse arendusele ja kirjelda palun, kuidas see protsess kujuneb algusest lõpuni.", "a": "Praegu on niimoodi, et enamus, nii-öelda, arendustegevusi toimub siis niimoodi, et kaks inseneri, kes vajasid enda tööle abivahendit, lõid siis selle toote ja panid kogu oma, nii-öelda, know-how AI abil, ehitasid selle uue tööriista valmis. Ja nüüd, kuna neid kliente, kes meil on praegu, on nii vähe, siis tegelikult me teeme mõlemas ettevõttes võib-olla seda viga, et ainult mõne tagasiside pealt teeme nagu uue tehnoloogilise otsuse. Et ooh, klient ütles, et see nupp võiks valgelt särada, ja siis me oleme nagu, ooh, kui see valgelt säraks, et küll nüüd kõik ostavad. Et seda nagu mulle tundub, me teeme nagu mõlemas ettevõttes seda viga."}, {"type": "k", "k": "K5", "q": "Kuidas te püüate aru saada, mida kliendid või kasutajad tegelikult vajavad?", "a": "See on nagu mõlemas ettevõttes nii, et kui oled omaniku rollis, siis on nagu see probleem, et ma tean täpselt, mida nad tahavad, et see on nagu see ju, mille pärast ma selle ettevõtte tegin ja ma nägin, et kõik oli kogu aeg ainult nii. Aga tegelikult see oli minu ainult minu enda probleem. Ja samamoodi ma näen teises ettevõttes, et seda probleemi nähakse hästi enesekeskselt. Ja siis see mentorite tagasiside on mõlemal puhul andnud seda, et mingil hetkel veel intervjuusi, küsige päris inimeste käest. Ja ongi, et praegu on mõlemas ettevõttes see miinuspool, et valim on nii väike, kelle põhjal neid otsuseid teha, mis edasi teha. Et tegelikult võiks see valim ju palju suurem olla. Ja siis muidugi, mis me oleme teinud, on see ka, et me püüame aru saada, et tehniliselt kus see mingi asi välja kukub, et kus hetkel klient pooleli jäi, ja siis võib-olla proovime rohkem neid intervjuude käigus seda kohta nagu suunata küsimustesse. Ja siis üks oluline asi, mida tunnen, et mina teen ja kõik teised mu ümber ka teevad, on see, et kui sul on kasutajaintervjuu, siis ole vait ja kuula. Me kõik teeme seda, et kui keegi ütleb, et siin see ei toimi, siis ma hakkan kohe õigustama, et ei, aga tegelikult on nii. Ainult tegelikult ta lihtsalt ei saanud aru. Et see on nagu täiega vale lähenemine."}, {"type": "k", "k": "K6", "q": "Kirjelda ühte hiljutist arendamise teekonda algusest kuni arenduse lõpuni.", "a": "Raamatupidamisettevõttes hakkasime ühe kalkulaatori tööriistaga. See alguses oli kohe mõttena olemas, sellest on juba poolteist aastat möödas, siis meil ei olnud teostust. Raamatupidajatega me tegime nagu intervjuusid, et tegelikult iseenesest nagu võiks olla teema. Mõni klient ütles ka, et võiks olla teema. Ja nüüd siis meie turundus tegi siis selle, nii-öelda, kampaamia, mis oli nagu hea sisend. Et lõpuks kui siis tehniline pool selle kätte võttis, siis see tegelikult oli hästi kiiresti tehtav asi. Ja nüüd meil oli ka, nii-öelda, ja kui see ükskord valmis sai, siis tegelikult ühe nädalaga sai nagu arendus. Siis me saime kohe ka kliendiintervjuu teha ja tagasiside korjata, et kas ta saab sellest ikkagi nii aru, nagu me plaanisime. Siis mina ise, kes ma ei ole nagu valdkonna inimene, tegin selle läbi ja nüüd siis on see lõppviimistluses. Aga sisendi kogusime ju mitmekümne kliendi intervjuu pealt. Ja tagasisidet küsisime ja testimist küsisime raamatupidajatelt, kes siis lõpuks nagu selle, nii-öelda, mudeli sisendiandjad on. Ja väga vähe see tagasisidet, kedagi tegelikult ei huvita. Seega see peab olema nagu hästi selline iseenesest tulev. Ehk siis selle toote puhul kokkuvõtlikult aasta poolteist uurimist ja kaks nädalat tegemist. Ma ütleks, et ongi, et kui sul nagu eelinfo on tehtud, siis see on kättevõtmise asi."}, {"type": "interv", "k": "K6.3", "q": "Kuidas otsustasid, millist ideed tasub edasi arendada ja millest loobuda?", "a": "Raamatupidamisettevõttega oleme nii kaua tegutsenud, et me nüüd juba nagu, meil on kõikidel tekkinud selline tunnetuslik, nii-öelda, et proovime nüüd mõnda aega seda ja siis teeme seda. Ja kui see ka ei aita, siis edasi. Ja üks osanikest hoiab meid tegelikult siis väga palju tagasi, et me igasuguse lennuideega kaasa ei lähe. Ehk siis ma ütleks, et see on nagu pigem tunnetuslik, kuna meie turgudel mõlemal ei ole nii palju kliente veel või nii palju valimit, siis me peame hästi palju tunnetuslikke otsuseid tegema."}]}, {"nr": 3, "title": "KLIENDI JA KASUTAJA ROLL ARENDUSES", "tpb": "TPB: Behaviour + Attitude", "qa": [{"type": "k", "k": "K7", "q": "Kuidas teie arendusmeeskond puutub kokku klientidega?", "a": "Mõlemas ettevõttes otse osaleb kliendiintervjuudel. Ja seda nagu ma olen ka pushinud, et ta vähemalt saab kokku selle lõppkliendiga, et see ei oleks ainult siis müügi- või business development'i tagasiside, sest et iga inimene kuuleb seda, mida tema kuulab ja ütleb siis sisendiks seda, mida ta arvas aru saavat. Seega on nagu tegelikult väga oluline, et see, kes lõpuks siis seda arendab, osaleb ise ka ja saab aru, kuulab, mida see inimene talle räägib, mida tegelikult vaja on."}, {"type": "k", "k": "K8", "q": "Kuidas te klientidega nende vajadustest, probleemidest või kogemustest räägite?", "a": "Enamus kas siis videointervjuud, veebi teel või e-mailiteel, ja paar küsimustikku me oleme ka teinud, nagu online'i küsimustikku. Siis mingi selline kergelt engagement'i otsimine sotsiaalmeedias. Ehk siis noh, selles mõttes jah. Aga nendes kummaski ettevõttes sellist, et lähen ukse taha ja istun, joon kohvi, seda nagu ei ole."}, {"type": "interv", "k": "K9.täpsustav", "q": "Kas selline kliendiga rääkimine on mingi süsteemne protsess?", "a": "Raamatupidamisettevõtte puhul on ikkagi eesmärk olnud, et iga nädal rääkida siis mõne kasutaja või kliendiga ja küsida tagasisidet, et miks mingid asjad ei juhtunud või juhtusid. Seda ma olen püüdnud nagu iga nädal hoida, et enamasti see on lihtsalt selline õnnelik juhus olnud. Sellel ei ole süsteemsust, vaid kuidagi iga nädal toimub midagi, millest kinni haarata. Ehk siis midagi ebaõnnestub või midagi läheb hästi, siis kohe ongi, et võtad kõne peale, et kuule, käime selle hetke läbi. Ja teise ettevõttega tegelikult on samamoodi, et eesmärgiks on selline viis kõne nädalas teha, aga just et kui on mingi olukord, siis me kindlasti igat võimalust kasutame."}, {"type": "k", "k": "K10", "q": "Too palun üks konkreetne näide olukorrast, kus kliendi sisend muutis teie algset plaani, prioriteeti või lahendust. Kirjelda seda olukorda.", "a": "Raamatupidamisettevõttes oli seal mingisugune käibemaksu lahter vanas süsteemis. Ja siis oligi, et kui klient ei saanud aru, mis see oli, siis ammugi see inimene, kes küsis teenust, ei saanud aru, mis see oli. Seega sellised parandused, mis puudutavad nagu UX-i, neid saab nagu suhteliselt kiirelt ja ruttu teha ja neid me oleme ka teinud. Ja siis tuli meelde ka see, et kui ma tegin selle kasutajavaate intervjuu, siis tegelikult seal me parandasime kohe visuaale, mis teeks arusaadavamaks selle flow inimesele, kes ei jaga võib-olla midagi. Ehk siis jah, teha rohkem."}]}, {"nr": 4, "title": "SUHTUMINE TEENUSEDISAINI / KASUTAJAKESKSUSESSE", "tpb": "TPB: Attitude + Behavioural Beliefs", "qa": [{"type": "k", "k": "K11", "q": "Millist väärtust sa näed kasutajakeskses lähenemises? Põhjenda oma arvamust.", "a": "Meil õnnestus ülikooli teenusedisaini programmis osaleda, kus tudengid tegelikult tegid selle osa meile väga paljuski ära just selle ühe osapoole suhtes. Et kuna see on ju platvorm, mis ühendab kahte poolt, siis see üks osa kaeti nagu väga hästi sealtpoolt ära ja täna me tegelikult olemegi teinud enamuse sellest lahendusest just selle, nii-öelda, mudeli põhjal, mis me sealt saime. Ehk siis ma ütleks, et jällegi valim on olnud väga pisike. Et ma soovitaksin, teeksin uuesti mida iganes, siis ma võtaksin suuremad valimid, et enne küsiksin rohkem ja teeksin neid, nii-öelda, võib-olla põhjalikumalt. Aga kogu see lahendus on tegelikult ehitatud nende kliendiintervjuude põhjal. Absoluutselt teistpidi ei tohiks."}, {"type": "interv", "k": "K11.täpsustav", "q": "Kas oled kunagi kahelnud, et selline lähenemine end ära tasub?", "a": "Ja, miks, et mõlema ettevõtte puhul nagu kuidagi, kui ise oled selle sees, kui sa ise iga päev tunned seda probleemi, siis sulle tundub, et kõikidel teistel on täpselt sama probleem. Aga kui küsima hakkad, siis tegelikult need küsimused, et millega sa täna seda probleemi lahendad, siis see võib olla nii lihtne vastus, et sul ei olegi vaja seda asja. Ja seda ei ole mitte ainult ühes ettevõttes. Aga ma ütleks pigem ikkagi jah, et ei kahetse, tasub ikka."}, {"type": "k", "k": "K12", "q": "Millised on sinu meelest kasutajakeskse lähenemise kitsaskohad või piirangud?", "a": "Kitsaskohad, no seal tekkiski see viga, et justkui jälle saab kahelt inimeselt mingi sisendi, et nii on nagu võiks parem olla või nii on halb, siis justkui hakkad seda kohta remontima. Aga tegelikult tuleb välja, et veel on mingisugune hunnik kasutajaid, kelleni sa sellel alguse hetkel ei jõudnud ja tegelikult seda vajadust ei ole. Ehk siis see on see, et sa pead väga kindlalt teadma, kes sul see ideaalne kliendi profiil on, et kui sa kogemata nagu vale grupi oled arvestanud, et siis suures pildis see ei vii edasi. Et see, või jah, mõlemal ettevõttel on see sama probleem tegelikult, et see võib olla piiranguks. Või siis kui sul on tõsiselt ajamahukas ja rahaliselt suuremahulised arendused, siis tõesti see, et sul see lõppklient muutub, või sul on vaja, et see prototüüpimise hetkel on hästi suur osa see testi-valideeri tsükkel, et nagu seda asja tuleks rohkem teha."}]}, {"nr": 5, "title": "SOTSIAALSED JA PROFESSIONAALSED MÕJUTAJAD", "tpb": "TPB: Subjective Norm", "qa": [{"type": "k", "k": "K13", "q": "Kuidas sinu meeskond/kolleegid suhtuvad kasutajakesksesse lähenemisse ja miks?", "a": "No ma ei tea hästi, et kui on tehnilisem või arendaja inimene, siis mulle tundub, et tema see usk nagu sellesse oma asja on palju suurem. Ma arvan, et on vähem avatud selles, et mida need müügiinimesed ka teavad. Vaata, ja see on tootmisettevõttest täpselt sama, et see, kes nagu päris asja teeb, et tema on nagu vähem avatud ja skeptilisem. Ja siis on see nagu ülejääv meeskond, kes on nagu, oh, imelahe mõte, teeme ära. Vaata, et suhtleme inimestega, et tahame nagu kõigile meeldida."}, {"type": "k", "k": "K15", "q": "Kuidas on sinu suhtumist või praktikaid mõjutanud laiem ettevõtluskeskkond, näiteks kiirendid, mentorid, sarnased ettevõtted või konkurendid? Miks?", "a": "Nüüd ma ütlen, et eile oli kolmandat korda tooteprototüübi koolitusel ja nagu alles nüüd hakkab kohale jõudma. Hetkel mulle tundub, et see ettevõtlus on nagu väga heas positsioonis, et annab veel õppida ja paremini teha. Seega nagu jah, et see kaks aastat on olnud ju kiirendi, et tegelikult see on nagu, mulle tundub isegi, nagu ei ole ikka veel piisav, kogu aeg on nagu õppida."}, {"type": "interv", "k": "K15.1", "q": "Kes on olnud eeskujuks? Miks on eeskuju?", "a": "Bolt on Eesti maastikul kindlasti üks ettevõte, mille moodi, ja siis igasugused Starship ja Cleveron ja sellised tootmise mõttes. Ja mulle meeldib ka üks tuntud ettevõtja, kes ütleb beautiful face ugly backend. Et see nagu kehtib iga asja kohta, mis oma ettevõttes hakkad tegema."}, {"type": "k", "k": "K16", "q": "Kas sul on olnud formaalne kokkupuude teenusedisaini metoodikaga, koolitused, programmid, meistriklassid vms?", "a": "Jah, me olime seal ülikooli teenusedisaini programmis. Meil oli see märkimisväärne võimalus osaleda esimesel ja teisel kursusel ja siis sealt tegelikult päris palju õppida just selle raamatupidamistarkvara kontekstis."}]}, {"nr": 6, "title": "VÕIMEKUS JA BARJÄÄRID", "tpb": "TPB: Perceived Behavioural Control", "qa": [{"type": "k", "k": "K17", "q": "Kirjelda ühte olukorda, kus oleksid tahtnud klienti rohkem kaasata, aga see ei õnnestunud. Mis sai takistuseks ja miks?", "a": "Praegu ma olen nagu saatnud neid testimiseks välja, et palun testige, aga me ei ole tagasisidet saanud. Ja üks klient, siis ma olen oodanud temalt tagasisidet, siis ta ei ole lihtsalt oma aja puuduse tõttu seda, nii-öelda, andnud. Et miks see saamata jäi, on see, et noh, et tegelikult siin on see järjepidevus endal, et jah, kui ma võtan telefoni kätte ja helistan, siis tegelikult inimene annab mulle selle vastuse. Et see, et see online küsimustik ja meiliteel tegelikult täna veel ei toimi, et inimesel ei ole aega ja see on igalt poolt tuleb sulle seda. Seega täna see päris telefonikõne ja päris helistamine on see, mis toimib."}, {"type": "interv", "k": "K17.1", "q": "Millised ressursid või tingimused puudusid?", "a": "No oleks raha. Et selles mõttes on ikkagi oluline, et oleks aega. Et motivatsiooni on, aga lihtsalt aega ei ole. Et tegelikult sa leiad selle kümme minutit, et helistada kliendile, ja see on nagu, võtad ennast kokku ja teed ära ja pärast on nii hea tunne. Aga noh, tegelikkuses, kui sul on nagu vaja koju süüa osta ja arveid maksta, siis see ei ole nii, et ma nagu praegu võtan ennast mugavustsoonist välja ja teen selle kuus kõnet ära. Et see siis tegelikult vajaks nagu sellist töötavat mudelit, et ma saaksin töötada."}]}, {"nr": 7, "title": "TULEVIKUVAADE JA KAVATSUSED", "tpb": "TPB: Intention", "qa": [{"type": "k", "k": "K18", "q": "Kuidas soovid muuta tänast protsessi kliendi kaasamise vaates järgmistes arendustöödes?", "a": "No mina näen, et mõlema ettevõtte tooted on sellised, kus saaks klienti kaasata mingisuguse motivatsioonipaketiga, et mulle tundub, et see täna on nagu selline kasutamata asi. Et igasugune osaluste ja ühisrahastuse teema, mis paneksid nagu, et noh, muidu ongi vastasel juhul, et mingid inimesed teevad mingit platvormi, et suva, et kui ma saan seal tasuta kasutada, siis mida ma siis eriti midagi ei võida ka, et mis ma siis sinna panustan. Et see kliendi motivatsioonipakett tundub mul olevat paigast ära ja see oleks see, millega oleks vaja tulevikus tegeleda."}, {"type": "interv", "k": "K18.1", "q": "Milliseid konkreetseid tegevusi oled juba alustanud või planeerinud?", "a": "Nende kahe ettevõttega ei ole nii lihtne. AI-platvormi puhul on meil niimoodi, et on mingid kliendid, kes tahavad, et meie toodet nendele kohandame ja seega me natukene teeme nendega rohkem koostööd, võtame rohkem raha ja siis teeme neile kohandatud lahenduse. Et me oleme nii väga katsetanud selle uue tiimi kontekstis, et me proovime esimesed kolm kuud ühte asja, siis me proovime teist asja, et kuni me oleme nagu midagi valideerinud, et siis saab alles neid uusi ideid hakata lauale tooma. Et see hüppamine on nagu kõige raskem, et kui juba need otsused on tehtud, et siis nende juurde peab praegu jääma."}]}]};
const INTERVIEW_B = {"id": "ai_P2", "label": "P2", "blocks": [{"nr": 1, "title": "SISSEJUHATUS JA TAUST", "tpb": null, "qa": [{"type": "k", "k": "K1", "q": "Kirjelda palun oma ettevõtet – millega see tegeleb ning milline on sinu enda roll ettevõttes.", "a": "Meie ettevõte teeb puidust sisustustooteid ja väikemööblit, suuresti eritellimusena. See tähendab, et me ei müü lihtsalt valmis asja riiulist, vaid sageli käib sinna juurde mõõdistamine, viimistluse valik ja paigaldus ka, ehk kogu ahel peab kokku töötama. Mina olen tootmisjuht ja minu töö on põhimõtteliselt vaadata, et see, mida kliendile lubatakse, oleks tootmises päriselt tehtav mõistliku aja, kvaliteedi ja kuluga. Uute lahenduste puhul tulen mängu eriti siis, kui müük tahab midagi paindlikumalt teha, aga töökoja vaates on vaja piirid ja loogika paika saada. Me oleme 18 inimesega ettevõte, nii et väga suurt bürokraatiat ei ole, aga samas enam päris puhtalt meistri pealt ka välja ei vea."}, {"type": "k", "k": "K2", "q": "Millised on teie peamised kliendid ja kuidas sa nendega kokku puutud.", "a": "Peamised kliendid on meil Eesti erakliendid ja väiksemad ärikliendid, lisaks on esimesed projektid Soome edasimüüjatega. Mina puutun nendega kokku pigem keerulisemate tellimuste puhul, kui müügist tuleb tootmisele risk või erilahendus."}, {"type": "k", "k": "K3", "q": "Kirjelda oma rolli ettevõtte toote või teenuse arendustööde tegemisel ja otsuste tegemisel.", "a": "Minu roll arenduses on üsna praktiline: kui tuleb uus toode, uus detail või mingi erilahendus, siis mina vaatan, kas see on päriselt toodetav nii, et töökojas asi laiali ei jookseks. Ma osalen nii toote enda kui ka tellimisprotsessi poolel, sest päris tihti probleem ei teki materjalist, vaid sellest, et kliendile on liiga vara või liiga umbmääraselt midagi ära lubatud. Tootmise korralduse, tööjärjekorra, teostatavuse ja mõne standardi paika panemisel saan ma ise otsustada, aga hinnastuse, suuremad investeeringud ja laiemad suunaotsused lähevad omaniku lauale. Ehk siis mina olen see filter müügi ja tootmise vahel, kes peab ütlema, kus on mõistlik paindlikkus ja kus läheb asi juba kalliks või riskantseks."}, {"type": "interv", "k": "K3.1", "q": "Kuidas arendusega seotud otsused teie ettevõttes kujunevad?", "a": "Enamasti kujunevad need otsused meil nii, et algatus tuleb kas müügist, kliendist või omanikult, aga enne päris lukku panemist peab tootmine selle läbi närima. Mina vaatan, kas asi on tehtav olemasolevate inimeste, pinkide, materjalide ja tähtajaga või tekitab see kohe ümbertegemist ja pudelikaelu. Väiksemad protsessiotsused saan ma ise ära teha, aga kui jutt läheb hinnastusse, suuremasse investeeringusse või sellesse, kas mingit uut suunda üldse võtta, siis seal on omaniku sõna määrav. Praktikas on probleem tihti see, et otsus sünnib liiga vara kliendi lubaduse pealt ja tootmine kaasatakse natuke hilja. Siis me ei arenda enam rahulikult, vaid parandame jooksu pealt."}]}, {"nr": 2, "title": "PRAEGUNE ARENDUSPRAKTIKA", "tpb": "TPB: Behaviour (tegelik käitumine)", "qa": [{"type": "k", "k": "K4", "q": "Mõtle oma ettevõtte tavapärase toote/teenuse arendusele ja kirjelda palun, kuidas see protsess kujuneb algusest lõpuni.", "a": "Tüüpiliselt algab meil asi sellest, et müük tuleb mingi sooviga lauda, kas kliendi erilahendus, uus mõõt või siis mõte, et võiks sellest teha korduva mudeli. Esimene filter on mul üsna konkreetne: kas see on olemasolevate pinkide, inimeste ja tarneaegadega tehtav või hakkab kohe alguses tootmist lõhkuma. Kui on vaja, käime objektil mõõdistamas või vaatan koos müügiga joonised üle, sest päris tihti tekib probleem juba seal, et kliendi peas on üks asi ja joonisel teine. Siis paneme paika materjali, viimistluse, furnituuri ja selle, mis on päriselt fikseeritud ning mis on veel lahtine, sest just need “veel vaatame jooksvalt” kohad teevad hiljem kõige rohkem kahju.\n\nKui lahendus on uus, siis me teeme kas detaili näidise või väikse proovijupi, no vähemalt kriitilisest kohast. Näiteks meil oli üks sahtliboks, kus klient tahtis väga puhast esipilti, ilma nähtavate käepidemeteta, aga samal ajal üsna kitsast mõõtu ja tumedat peitsi. Paberil tundus ilus, aga proovides selgus, et valitud mehhanismiga jäi avamine ebamugav ja peits tõi sõrmejäljed kohe välja. Enne kui selle seeriasse lasime, muutsime nii servalahendust kui furnituuri, ja see päästis hiljem päris mitu ümbertegemist.\n\nKui otsus on tehtud, siis läheb töö tootmisse juba tööjooniste, lõikelistide ja üsna selgete märkustega, mitte lihtsalt “teeme nagu eelmine kord”. Siis tuleb hankimine, tootmine, vahepealne kontroll ja vajadusel paigaldus. Päris lõpp ei ole minu jaoks see, et asi läks uksest välja, vaid see, kas pärast tuleb garantiijuhtum, kliendi küsimus või sisemine närviline arutelu, miks jälle midagi pidi ringi tegema. Sealt me tegelikult õpimegi, kuigi noh, aus süsteem selleks on meil alles poole peal."}, {"type": "k", "k": "K5", "q": "Kuidas te püüate aru saada, mida kliendid või kasutajad tegelikult vajavad?", "a": "Meil see käib üsna praktiliselt, mitte nii, et teeme eraldi mingeid suuri uuringuid. Me vaatame tellimuste pealt, kus kliendid kõige rohkem küsivad juurde, kus nad ümber mõtlevad ja mis kohtades pärast paigaldust või garantiis probleem välja tuleb. Keerulisemate projektide puhul käin ise ka müügiga kaasas ja siis on üsna kiiresti näha, kas klient räägib päris vajadusest või lihtsalt mingist esialgsest ideest, mis ruumi või kasutuse mõttes hästi ei tööta. Lisaks annab mõõdistamine palju infot, sest seal tuleb välja, kuidas asja tegelikult kasutama hakatakse. Ehk me püüame vajadusest aru saada läbi konkreetsete juhtumite, mitte teooria kaudu."}, {"type": "k", "k": "K6", "q": "Kirjelda ühte hiljutist arendamise teekonda algusest kuni arenduse lõpuni.", "a": "Üks värskem näide oli meil vannitoakappide poolel, kus me saime järjest samu muresid. Klient tahtis küll eritellimust, aga tegelikult kordusid üsna sarnased soovid: seinale kinnituv kapp, puhas esipind, paar mõõtu, valamu peale ja viimistluses kas tammetoon või värvitud MDF. Probleem ei olnud isegi niivõrd selles, et kapp oleks keeruline teha, vaid selles, et iga kord hakkas nullist lahti hargnema, mis valamu tuleb, kus torud jooksevad, kas sifoon jääb keskele või nihkesse, kas sahtel peab ümber tegema ja nii edasi. Sealt tulidki meil ümberjoonestamised, tootmises küsimused ja mõnikord ka paigalduses ebameeldiv üllatus.\n\nAlgus tuli ausalt müügi poolt, nemad ütlesid, et seda tüüpi toodet küsitakse palju ja võiks olla kiirem pakkuda. Mina võtsin siis viimased tellimused ette, vist kümmekond või natuke rohkem, ja vaatasin, mis päriselt kordub ja mis on ainult näiline erisoov. Sealt tuli üsna selgelt välja, et välismõõdud kõikusid, aga konstruktiivsed sõlmed olid suures osas samad. Siis me tegime väikese sisemise arutelu, müük, mina, paigaldusest üks mees ja üks kogenud tisler, mitte mingi suur töötuba, lihtsalt istusime jooniste ja fotode otsa.\n\nMinu ettepanek oli, et me ei tee “ühte standardtoodet”, sest see meil ei töötaks, vaid teeme piiratud raamistikuga lahenduse. Ehk kolm laiust, kaks sügavust, kindlad siinid, kindel riputussüsteem, etteantud valamuvariandid ja piiratud viimistlused. Müük tahtis alguses rohkem valikuid sisse jätta, sest kliendile meeldib, kui saab kõike. Ma surusin vastu, sest kui valikuid on paberil liiga palju, siis töökojas maksame selle kinni.\n\nSeejärel tegime prototüübi. Esimese tegime oma majas, et saada aru, kuidas sahtel torudega käitub ja kui palju jääb tegelikult kasutatavat ruumi. Seal tuli kohe välja, et üks esipaneeli lahendus, mis pildil nägi hea välja, hakkas pärast viimistlust vahedega mängima, sest materjal elas natuke rohkem kui müük arvas. Muutsime servatöötlust ja jätsime ühe “ilusa” variandi kõrvale. Siis lisasime tellimislehele paar asja, mida enne üldse süsteemselt ei küsitud, näiteks sifooni täpne asukoht ja see, kas sein on päriselt kandev või tuleb lisakinnitus lahendada paigalduse käigus.\n\nLõpp ei olnud selline, et nüüd kõik on valmis ja korras. Pigem saime ühe tootepere selliseks, et seda saab pakkuda kiiremini, joonestamist on vähem ja paigalduses tuleb vähem üllatusi. Kliendi jaoks jäi ikkagi tunne, et ta saab endale sobiva asja, aga meie jaoks tekkisid piirid. Minu mõttes oligi see arenduse põhiline tulemus, et me ei müü enam lootust, vaid natuke täpsemalt seda, mida me tegelikult suudame teha."}]}, {"nr": 3, "title": "KLIENDI JA KASUTAJA ROLL ARENDUSES", "tpb": "TPB: Behaviour + Attitude", "qa": [{"type": "k", "k": "K7", "q": "Kuidas teie arendusmeeskond puutub kokku klientidega?", "a": "Enamasti kaudselt müügi kaudu, sest nemad võtavad esmase sisendi ja toovad kliendi soovid lauale. Mina lähen ise mängu siis, kui projekt on keerulisem või on oht, et lubadus ja tootmise reaalsus ei lähe kokku."}, {"type": "interv", "k": "K7.1", "q": "Kas arendusmeeskonnal on kunagi otsesuhtlust lõppkasutajaga? Kirjelda.", "a": "Jah, aga pigem valikuliselt. Mina ja vahel ka jooniste või paigalduse poolelt inimene suhtleme lõppkasutajaga siis, kui on keeruline erilahendus, mõõdistuse teema või näha, et klient ja müük räägivad asjast natuke mööda."}, {"type": "k", "k": "K9", "q": "Kirjelda kliendilt tagasiside kogumise protsessi.", "a": "See protsess on meil üsna hajus, mitte eraldi süsteemina üles ehitatud. Põhiline tagasiside tuleb kolmest kohast: müük kuuleb seda tellimise ajal ja pärast paigaldust, meie näeme seda garantiijuhtumite ja reklamatsioonide pealt ning keerulisemate tööde puhul kuulen mina ise otse kliendilt või paigaldajalt, kus asi läks ootusega lahku. Me ei saada igale kliendile mingeid pikki küsitlusi, vaid vaatame korduvaid mustreid: mis küsimused tulevad enne ostu, kus hakatakse viimasel hetkel ümber mõtlema ja mis pärast probleemi teeb. Kui sama teema kordub mitu korda, siis me võtame selle arutellu ja vaatame, kas viga on tootes, joonistes, valikute esituses või lihtsalt selles, et lubati liiga ümmarguselt. Noh, minu jaoks on oluline, et tagasiside jõuaks tootmisse piisavalt kiiresti, muidu kordame sama viga mitu korda järjest."}, {"type": "interv", "k": "K9.1", "q": "Kuidas see sinuni jõuab?", "a": "Põhiliselt jõuab see minuni müügi kaudu, kas vestluste kokkuvõtete, probleemsete tellimuste või garantiijuhtumite pealt. Keerulisemate asjade puhul näen ise ka mõõdistusel või paigaldusjärgses tagasisides, kus ootus ja tegelik lahendus lahku lähevad."}, {"type": "interv", "k": "K9.2", "q": "Kuidas te tagasisidet rakendate?", "a": "Me rakendame tagasisidet eelkõige seal, kus see mõjutab korduvust ja vigade arvu. Kui näeme, et sama küsimus, sama eksimus või sama ümbermõtlemine tuleb mitu korda, siis me ei võta seda enam üksiku juhtumina, vaid vaatame, kas asi on joonises, valiku esituses, mõõdistamises või tootmise järjekorras. Näiteks mõne lahenduse puhul oleme vähendanud viimistlus- või lisavalikuid, sest kliendile tundus valikuvabadus hea, aga lõpuks tekitas see rohkem segadust ja venitamist. Teine koht on detailid tootmises: kui paigaldusest või garantiist tuleb tagasi, et mingi sõlm on tundlik või ebamugav kasutada, siis muudame konstruktsiooni, isegi kui see tähendab alguses natuke rohkem tööd. Ehk me ei tee sellest eraldi suurt programmi, aga kui tagasiside aitab vähem ümber teha ja lubatu paremini ära teha, siis see läheb kasutusse küll."}, {"type": "interv", "k": "K9.täpsustav", "q": "Miks te ei kasuta klientidelt tagasiside kogumiseks regulaarseid küsitlusi?", "a": "Põhjus on üsna lihtne: meil ei ole seni olnud tunnet, et regulaarne küsitlus annaks paremat infot kui see, mida me juba päriselt töö käigus näeme. Eritellimuse puhul on kliendi kogemus nii konkreetse projekti nägu, et üldine ankeet kipub andma pehmet juttu, aga mitte seda kohta kätte, kus asi tegelikult lappama läks. Meile on kasulikum vaadata, kus klient muudab tellimust, mille kohta ta korduvalt üle küsib ja millest hiljem garantiiteema tekib. Teine pool on ressurss ka: 18 inimesega ettevõttes peame valima, kuhu aeg läheb, ja kui küsitlusest ei tule otsest tootmist parandavat sisendit, siis see vajub tahaplaanile. Noh, võib-olla me peaks seda mingil kujul tegema, aga ainult siis, kui see on lühike ja seotav konkreetse otsusega."}, {"type": "k", "k": "K10", "q": "Too palun üks konkreetne näide olukorrast, kus kliendi sisend muutis teie algset plaani, prioriteeti või lahendust. Kirjelda seda olukorda.", "a": "Vannitoakapi puhul tahtsime algul pakkuda rohkem viimistlus- ja mõõduvariante, aga kliendid jäid toppama just sifooni, sahtli ja paigalduse konflikti peale. Selle järel muutsime prioriteeti: enne valikute laiendamist tegime kindla siselahenduse, mis mahu- ja paigaldusvead maha võttis."}]}, {"nr": 4, "title": "SUHTUMINE TEENUSEDISAINI / KASUTAJAKESKSUSESSE", "tpb": "TPB: Attitude + Behavioural Beliefs", "qa": [{"type": "k", "k": "K11", "q": "Millist väärtust sa näed kasutajakeskses lähenemises? Põhjenda oma arvamust.", "a": "Mina näen selle väärtust siis, kui see aitab kliendi ootuse enne tootmist selgemaks saada. Kui me saame varem aru, mida inimene päriselt kasutada tahab, mitte ainult mida ta esimeses kõnes ütleb, siis jääb vähem ümbermõtlemist, vähem erilahendusi vales kohas ja vähem vaidlust selle üle, mida lubati. Meie puhul tähendab see üsna otseselt vähem praaki, vähem garantiiteemat ja rahulikumat tööd töökojas. Kui kasutajakesksus on lihtsalt jutt või mingi ilus skeem seinal, siis mul sellest kasu ei ole, aga kui see aitab tellimise ja tootmise paremini ühele joonele saada, siis see on päris väärtus."}, {"type": "interv", "k": "K11.täpsustav", "q": "Miks teie kogemuses kliendi tegelik vajadus alguses nii sageli varju jääb?", "a": "See jääb varju peamiselt sellepärast, et klient räägib alguses lahendusest, mitte oma päris olukorrast. Ta ütleb näiteks, et tahab “ujuksahtliga tamme tooni vannitoakappi”, aga ei alusta sellest, et ruum on kitsas, torud tulevad valest kohast, koristada peab olema lihtne ja ta ei taha paigalduspäeval üllatusi. Müük kuuleb esimest soovi ja tahab loomulikult kiiresti pakkumise ära teha, sest muidu läheb klient edasi. Aga just selles kohas tekibki viga: vorm võetakse liiga vara lukku, enne kui kasutus ja piirangud on läbi räägitud.\n\nÜks konkreetne näide oli meil projektiga, kus klient soovis väga puhast minimalistlikku esipinda ja peidetud käepidemeid. Paberil kõik klappis, no vähemalt esialgu, aga kui mõõdistusse läksime, tuli välja, et valamu sifoon, seina kõverus ja olemasolevad ühendused söövad sahtliruumist suure osa ära. Klient ei olnud seda ise osanud ette näha ja ega müük ka ei surunud alguses neid küsimusi piisavalt läbi. Tulemuseks oli see, et me tegime jooniseid ümber, vahetasime siselahendust ja nihutasime tähtaega. Kliendi jaoks tähendas see segadust, meie jaoks lisatunde ja närvi.\n\nTeine põhjus on see, et inimesed ei oska alati oma vajadust sõnastada. Nad räägivad selle järgi, mida nad on Pinterestis näinud või naabri juures näinud, mitte selle järgi, kuidas nad asja igapäevaselt kasutavad. Ja kui meie ise ei küsi piisavalt täpselt, siis jääbki mulje, et tellimus on selge, kuigi tegelikult ei ole. Mina näen seda väga lihtsalt: vajadus ei jää varju mingi filosoofia pärast, vaid sellepärast, et liiga vara minnakse välimuse ja lubaduse juurde, enne kui kasutus, piirangud ja tootmise reaalsus on lauale pandud."}, {"type": "k", "k": "K12", "q": "Millised on sinu meelest kasutajakeskse lähenemise kitsaskohad või piirangud?", "a": "Minu jaoks on peamine piirang see, et kui minna ainult kliendi soovi järgi, siis lahendus võib muutuda tootmise mõttes liiga laialivalguvaks. Klient tahab arusaadavalt enda jaoks parimat ja võimalikult paindlikku varianti, aga tema ei näe seda, mida tähendab viis lisavalikut, hiline muudatus või ebamäärane mõõt meie töökojas. Teine asi on aeg: kui iga otsust hakatakse liiga pikalt läbi rääkima või testima, siis väiksemas ettevõttes võib tempo lihtsalt ära kaduda. Noh, kasutajakesksus on kasulik seni, kuni see aitab varem selgust saada; kui see toodab juurde segadust, erandeid ja lubadusi, mida pole mõistlik teha, siis ta töötab meile vastu."}]}, {"nr": 5, "title": "SOTSIAALSED JA PROFESSIONAALSED MÕJUTAJAD", "tpb": "TPB: Subjective Norm", "qa": [{"type": "k", "k": "K13", "q": "Kuidas sinu meeskond/kolleegid suhtuvad kasutajakesksesse lähenemisse ja miks?", "a": "Meil on suhtumine üsna erinev sõltuvalt rollist. Müük on sellele loomulikult kõige avatum, sest nemad näevad, et kliendile meeldib valik ja tunne, et teda kuulatakse, aga tootmises vaadatakse asja palju ettevaatlikumalt, sest iga lahtine ots tähendab hiljem rohkem segadust, ümbertegemist või veninud tähtaega. Mina ise olen seal vahepeal: ma ei ole selle vastu, kui kliendi vajadus aitab meil asja selgemaks teha, aga ma ei toeta seda siis, kui sellest saab lihtsalt järjekordne põhjus standardist kõrvale minna. Ehk meil väärtustatakse kliendi sisendit küll, aga ainult seni, kuni see on toodetav ja korratav."}, {"type": "k", "k": "K14", "q": "Kuidas juhtkond suhtub klientide kaasamisse arendusotsuste tegemisel? Miks?", "a": "Juhtkonna suhtumine on meil pigem selline, et klienti tuleb kuulata, aga mitte nii, et iga soov kohe arendusotsuseks muutub. Omanik saab aru, et kui me tahame kasvada ja eriti ekspordi poole liikuda, siis ei saa ainult oma kõhutunde pealt uusi lahendusi teha, mingit päris turu märki on vaja. Samas ta ei usu ka seda, et klient oskab ise öelda, mis on tootmise mõttes mõistlik lahendus, ja seal ma olen temaga üsna ühel nõul. Meil ongi juhtkonnas see põhimõte kujunenud, et kliendi kaasamine on kasulik siis, kui see aitab segadust vähemaks võtta, mitte juurde teha.\n\nHea näide oli see vannitoakappide teema, millest ma enne rääkisin. Alguses oli müügil ja omanikul mõte, et teeme hästi paindliku pakkumise, palju mõõte, palju viimistlusi, et klient tunneks, et saab täpselt endale sobiva asja. Aga kui me vaatasime päris tellimusi ja paigalduse järel tekkinud küsimusi, siis tuli välja, et inimesed ei jäänud kinni mitte viimistlusse, vaid hoopis sellesse, kuidas sifoon, sahtel ja kinnitused omavahel kokku lähevad. Pärast seda juhtkond toetas seda, et me tõmbasime valikut kitsamaks ja tegime mõned lahendused ette ära selgemaks. Ehk siis klient oli kaasatud küll, aga mitte küsitluse või töötoa vormis, vaid päris probleemide kaudu. Miks nii? Sest meie äris maksab lõpuks see, kas asi tuleb õigesti välja, õigel ajal ja ilma ümbertegemiseta. Kui kliendi kaasamine aitab seda saavutada, siis juhtkond on poolt, kui see teeb pakkumise ainult udusemaks, siis pigem tõmmatakse pidurit."}, {"type": "k", "k": "K15", "q": "Kuidas on sinu suhtumist või praktikaid mõjutanud laiem ettevõtluskeskkond, näiteks kiirendid, mentorid, sarnased ettevõtted või konkurendid? Miks?", "a": "Laiem ettevõtluskeskkond on mind mõjutanud pigem kaudselt kui nii, et nüüd oleks mingi konkreetne metoodika seinal ja kõik teevad selle järgi. Ma olen käinud mõnel EAS-i üritusel ja kuulanud teiste tootjate juttu, eriti nende omi, kes on meist natuke suuremaks kasvanud või ekspordi poole liikunud. Sealt on mul kõige rohkem kinnistunud üks üsna lihtne mõte: kui info kliendi soovist ei lähe alguses piisavalt puhtalt paika, siis tootmine maksab selle hiljem kinni. See ei ole minu jaoks mingi teooria, vaid üsna otsene seos.\n\nKiirendite ja mentorite puhul, noh, ma ei ole ise selline inimene, kes läheks igasugu arenguprogrammidesse ideid püüdma lihtsalt sellepärast, et see on popp. Aga kui keegi näitab oma näite pealt, et nad vähendasid ümbertegemisi sellega, et piirasid valikuid, tegid tellimise alguse selgemaks või panid tüüpilised veakohad paremini ette, siis see kõnetab. Üks mööblitootja rääkis kunagi üsna otse, et nad ei teeninud raha mitte kõige erilisema asja pealt, vaid selle pealt, mida nad suutsid korratavalt hästi teha. See jäi mulle meelde, sest meil on täpselt sama pinge: tahad kliendile vastu tulla, aga samal ajal ei saa iga projekt olla uus leiutamine.\n\nKonkurendid on ka mõjutanud, võib-olla rohkemgi kui mentorid. Mitte selles mõttes, et kopeeriks, vaid sa näed ära, kus turg läheb. Klient ootab täna kiiremat vastust, selgemat valikut ja üsna täpset lubadust, millal asi valmis saab. Kui konkurent suudab jätta mulje, et tellimine on lihtne ja risk väiksem, siis ta võidabki, isegi kui toode ise pole ilmtingimata parem. See on pannud mind rohkem mõtlema tellimisprotsessi peale, mitte ainult detaili või koostekvaliteedi peale.\n\nSarnaste ettevõtetega suheldes on veel üks asi välja tulnud: väikse ettevõtte meistrikeskne tööviis töötab teatud piirini väga hästi, aga kasvu peal hakkab see logisema. Meil on ka see koht käes. Vanasti piisas, et paar kogenud inimest teadsid peas, kuidas üks keeruline kapp lahendatakse. Nüüd, kui tellimusi on rohkem ja tahame Soome poole ka liikuda, siis see enam hästi ei kanna. Seal ei saa loota sellele, et “Jaan teab”. Peab olema varem selge, mida lubame, mis on standard ja kus algab erilahendus.\n\nMa ütleks nii, et välised mõjutajad on mind muutnud ettevaatlikumaks ilusa jutu suhtes, aga samal ajal avatumaks praktilistele parandustele. Kui keegi räägib kliendikogemusest abstraktselt, siis ma väga ei lähe sellega kaasa. Kui aga jutt jõuab selleni, et vähem küsimusi, vähem garantiitöid, vähem tagasipöördeid ja täpsem tootmise planeerimine, siis ma kuulan väga tähelepanelikult. Miks? Sest lõpuks on see minu laual, kas töökojas on rahu või on jälle nii, et keegi lõikab midagi ümber, sest müük lubas rohkem, kui tegelikult teha oli mõistlik."}, {"type": "k", "k": "K16", "q": "Kas sul on olnud formaalne kokkupuude teenusedisaini metoodikaga, koolitused, programmid, meistriklassid vms?", "a": "Päris formaalset, sügavamat kokkupuudet ei ole olnud. Ma olen käinud mõnel EAS-i või ettevõtjatele suunatud arendusüritusel, kus neid teemasid puudutati, ja sealt on mõned mõtted külge jäänud, aga see ei olnud selline asi, et nüüd meil oleks metoodika kasutusel või inimesed koolitatud. Pigem sain aru, et kliendi teekonda ja tellimise loogikat tasub vaadata sama tõsiselt kui toodet ennast. Aga noh, meie igapäevatöös on see jäänud ikkagi praktilise tunnetuse, tagasiside ja vigade analüüsi tasemele, mitte formaalseks teenusedisaini protsessiks."}, {"type": "interv", "k": "K16.1", "q": "K16.1 Kuidas see on sinu praktikat mõjutanud?", "a": "See on mõjutanud mind eelkõige nii, et ma küsin nüüd protsessi alguses rohkem ebamugavaid küsimusi ära, mitte ei looda, et küll töökojas jooksvalt lahendame. Enne oli meil päris tihti see muster, et müük tuli hea mõttega, klient oli elevil, ja tootmine pidi pärast nuputama, kuidas see asi nii teha, et kvaliteet ka alles jääks. Nendelt üritustelt ja teiste ettevõtjate jutust jäi mulle kõige rohkem külge see, et probleem ei ole ainult tootes, vaid selles, kuidas lubadus kliendini jõuab ja kui vara asjad lukku saadakse. Ma ei nimeta seda võib-olla mingiks metoodikaks, aga praktikas tähendab see, et ma tahan kriitilised valikud varem lauale saada: mõõdud, kinnitused, viimistlus, paigalduse eripärad, kõik need kohad, kus hiljem tavaliselt jama tekib.\n\nÜks konkreetne näide oli meil vannitoakappidega. Varem läks jutt kliendiga tihti stiili ja viimistluse peale, aga päris probleem tuli hiljem välja, kui selgus, et sifoon, sahtli sügavus ja seina olukord ei sobi omavahel kokku. Pärast seda muutsime oma tegemist nii, et enne hinnakinnitust peab olema selge, milline valamu tuleb, kuhu torustik jääb ja kas paigalduses on mingeid piiranguid. See ei kõla suure asjana, aga töökoja mõttes muutis palju, sest ümbertegemist tuli vähem ja närvipinget ka. Teine mõju on see, et ma suhtun nüüd skeptilisemalt lausesse “teeme kliendile pärast sobivaks”. Kui seda öeldakse liiga vara, siis tavaliselt tähendab see tootmises lisakulu. Nii et jah, ma ei ole hakanud kasutama suuri mudeleid või skeeme, aga ma olen muutunud palju rangemaks selles, et kliendi soov tuleb enne tootmist lahti võtta päris kasutuse tasandile, mitte jätta ilusa üldsõna tasemele."}, {"type": "interv", "k": "K16.täpsustav", "q": "Mis on peamine põhjus, miks see teadmine teie ettevõttes kasutusele ei jõudnud?", "a": "Peamine põhjus on see, et see teadmine jäi meil liiga üldiseks ega tõlkunud end otseselt tootmise või tellimisprotsessi muutuseks. Kui igapäevane surve on tähtajad, inimesed ja vead, siis selline asi vajub lihtsalt tahaplaanile."}]}, {"nr": 6, "title": "VÕIMEKUS JA BARJÄÄRID", "tpb": "TPB: Perceived Behavioural Control", "qa": [{"type": "k", "k": "K17", "q": "Kirjelda ühte olukorda, kus oleksid tahtnud klienti rohkem kaasata, aga see ei õnnestunud. Mis sai takistuseks ja miks?", "a": "Ühe keerulisema garderoobiprojekti puhul oleks tahtnud enne lukku panemist lõppkasutajaga paigalduse ja sisulahenduse läbi käia, aga suhtlus käis sisearhitekti ja müügi kaudu. Takistuseks oli aeg ja see, et keegi ei tahtnud lisaringi teha enne, kui hind juba ees oli."}, {"type": "interv", "k": "K17.1", "q": "Millised ressursid või tingimused puudusid?", "a": "Puudu oli eelkõige aeg, ühtne protsess ja selge vastutus selle osa jaoks. Igapäevane töö surub peale, tellimused peavad välja minema, ja siis ei jää ruumi, et võtta samm tagasi ning enne läbi mõelda, kus klient tavaliselt valesti aru saab või kus meie ise liiga vara midagi ära lubame. Teine asi oli see, et info oli laiali: müük teadis üht, paigaldus teist, tootmine kolmandat, aga keegi ei pannud seda süsteemselt kokku. Ja noh, ausalt, puudu oli ka selline ühine kokkulepe juhtkonna tasemel, et see ei ole “kui jõuab” teema, vaid päris töö osa."}, {"type": "interv", "k": "K17.2", "q": "Millised takistused on praegusel hetkel veel alles?", "a": "Peamised takistused on meil ikka samad, aga nüüd paistavad need lihtsalt selgemalt välja. Esiteks aeg ja tähelepanu: igapäevane tootmissurve on selline, et süsteemsemalt protsessi parandada jõuab vähe, kõik kustutavad põlenguid. Teiseks rollid on liiga hägused, eriti müügi ja tootmise vahel — kes täpselt kontrollib, et kliendile lubatu oleks tootmise mõttes realistlik, see ei ole alati enne lukku pandud. Ja kolmandaks meil on endiselt palju meistrite teadmise peal toimimist; see aitab kiiresti otsustada, aga teeb kordamise, õpetami const PAIR_NR = 2;

// Randomize order
const orderFlip = Math.random() < 0.5;
const INTERVIEWS = orderFlip ? [INTERVIEW_B, INTERVIEW_A] : [INTERVIEW_A, INTERVIEW_B];
const ORDER_LABEL = orderFlip ? "B_first" : "A_first";

const state = {
    step: "intro",
    consent: null,
    ratings: {},
    feedback: {},
    startTime: Date.now(),
    order: ORDER_LABEL,
    pair: PAIR_NR
};

function el(tag, attrs = {}, ...children) {
    const e = document.createElement(tag);
    for (const [k, v] of Object.entries(attrs)) {
        if (k === "class") e.className = v;
        else if (k === "html") e.innerHTML = v;
        else if (k.startsWith("on")) e.addEventListener(k.slice(2), v);
        else e.setAttribute(k, v);
    }
    for (const c of children) {
        if (typeof c === "string") e.appendChild(document.createTextNode(c));
        else if (c) e.appendChild(c);
    }
    return e;
}

function clearContent() { document.getElementById("content").innerHTML = ""; }

function renderProgress(text, percent) {
    const c = document.getElementById("progress-container");
    c.innerHTML = `<div class="progress">${text}<div class="progress-bar"><div class="progress-bar-fill" style="width:${percent}%"></div></div></div>`;
}

function escapeHtml(s) {
    if (s == null) return "";
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

// === Step 1: Intro + Consent ===
function renderIntro() {
    state.step = "intro";
    clearContent();
    renderProgress("Samm 1/4 — Sissejuhatus", 10);
    const root = document.getElementById("content");
    root.appendChild(el("div", { class: "card", html: `
        <h1>Intervjuude hindamise uuring</h1>
        <p><strong>Tere!</strong></p>
        <p>Suur tänu, et oled nõus selles uuringus osalema. Käesolev uuring on osa minu magistritööst.</p>
        <p>Sulle esitatakse kaks intervjuu transkriptsiooni, mis käsitlevad teenusedisaini ja kasutajakesksete praktikate kasutuselevõttu Eesti ettevõtetes. Sinu ülesanne on lugeda mõlemad intervjuud läbi ja hinnata nende sisu erinevaid aspekte 5-pallisel skaalal.</p>
        <div class="notice">
            <strong>NB!</strong> Ära otsi "õigeid" vastuseid — hinda oma sisetunde järgi, kuidas need vastused sulle mõjuvad.
        </div>
        <p>Intervjuud on jaotatud teemaplokkideks (PLOKK 1 kuni PLOKK 7). Iga ploki all on küsimused ja vastused, millele järgneb hindamisskaala.</p>
        <p><strong>Tähtis:</strong> Loe iga plokk hoolikalt läbi ja hinda kohe selle all olevat skaalat, kui info on värskelt meeles.</p>
        <h3>Ajakulu</h3>
        <p>Kogu uuring võtab orienteeruvalt 30–45 minutit.</p>
        <h3>Nõusolek</h3>
        <p>Osalemine on vabatahtlik ja anonüümne. Sinu vastuseid kasutatakse ainult teaduslikel eesmärkidel.</p>
        <div class="consent-options">
            <label><input type="radio" name="consent" value="yes"> Olen nõus osalema</label>
            <label><input type="radio" name="consent" value="no"> Ei soovi osaleda</label>
        </div>
    `}));
    const btn = el("button", { class: "btn", onclick: handleConsent }, "Edasi");
    root.appendChild(btn);
}

function handleConsent() {
    const sel = document.querySelector('input[name="consent"]:checked');
    if (!sel) { alert("Palun vali üks variant."); return; }
    if (sel.value === "no") {
        clearContent();
        renderProgress("", 0);
        document.getElementById("content").appendChild(el("div", { class: "card", html: `
            <h1>Aitäh!</h1>
            <p>Kahju, et seekord ei osale. Kui muudad meelt, võid alati lehe uuesti avada.</p>
        `}));
        return;
    }
    state.consent = "yes";
    renderInterview(0);
}

// === Render Interview ===
function renderInterview(idx) {
    state.step = "interview_" + idx;
    clearContent();
    const stepNum = idx === 0 ? 2 : 3;
    renderProgress(`Samm ${stepNum}/4 — Intervjuu ${idx + 1}/2`, 25 + idx * 35);
    const interview = INTERVIEWS[idx];
    const root = document.getElementById("content");

    root.appendChild(el("div", { class: "card", html: `
        <p class="meta">Intervjuu ${idx + 1} / 2</p>
        <h1>Järgneb intervjuu transkriptsioon</h1>
        <p>Loe iga plokk hoolikalt läbi ja hinda kohe selle all olevat skaalat, enne kui järgmisesse plokki liigud.</p>
        <p>Intervjuu on jaotatud 7 plokiks. Esimene plokk (sissejuhatus ja taust) on ilma hindamiseta — loe lihtsalt läbi.</p>
    `}));

    interview.blocks.forEach(block => {
        const card = el("div", { class: "card" });
        card.innerHTML = `
            <p class="meta">Plokk ${block.nr} / 7</p>
            <h2>PLOKK ${block.nr}. ${escapeHtml(block.title)}</h2>
            ${block.tpb ? `<p class="tpb">${escapeHtml(block.tpb)}</p>` : ""}
        `;
        block.qa.forEach(qa => {
            if (qa.type === "k") {
                const div = el("div", { class: "qa" });
                div.innerHTML = `
                    <p class="question"><strong>${escapeHtml(qa.k)}:</strong> ${escapeHtml(qa.q)}</p>
                    <p class="answer"><strong>Vastaja:</strong> ${escapeHtml(qa.a)}</p>
                `;
                card.appendChild(div);
            } else {
                const div = el("div", { class: "qa intervjueerija" });
                div.innerHTML = `
                    <p class="question"><strong>${escapeHtml(qa.k)}:</strong> ${escapeHtml(qa.q)}</p>
                    <p class="answer"><strong>Vastaja:</strong> ${escapeHtml(qa.a)}</p>
                `;
                card.appendChild(div);
            }
        });

        if (block.nr >= 2 && block.nr <= 7) {
            const ratingBox = renderRatingBox(idx, interview.id, block.nr);
            card.appendChild(ratingBox);
        }
        root.appendChild(card);
    });

    // Block 8 — quality + block 9 — overall
    const generalCard = el("div", { class: "card" });
    generalCard.innerHTML = `
        <p class="meta">Intervjuu kvaliteet ja üldmulje</p>
        <h2>PLOKK 8. Vastuste loomulikkus ja kvaliteet</h2>
        <p>Selles plokis hindad intervjuu üldist kvaliteeti terves ulatuses.</p>
    `;
    generalCard.appendChild(renderRatingBox(idx, interview.id, 8));
    generalCard.appendChild(renderRatingBox(idx, interview.id, 9));
    root.appendChild(generalCard);

    // Block 9 — open questions
    const textCard = el("div", { class: "card" });
    textCard.innerHTML = `
        <p class="meta">Lahtised küsimused</p>
        <h2>PLOKK 9. Lahtised küsimused</h2>
        <p>Palun vasta lühidalt järgmistele küsimustele. Vabatekstid on vabatahtlikud, kuid väga abiks.</p>
        <div class="form-field">
            <label>9.3 — Kas midagi tundus selles intervjuus ebatavaline, tehislik või ebaloomulik? Kui jah, siis mis täpselt?</label>
            <textarea id="feedback-${idx}-93" rows="4"></textarea>
        </div>
        <div class="form-field">
            <label>9.4 — Mis oli selle intervjuu kõige tugevam koht? Mis oli kõige nõrgem?</label>
            <textarea id="feedback-${idx}-94" rows="4"></textarea>
        </div>
        <div class="form-field">
            <label>9.5 — Kui peaksid pakkuma, kas see intervjuu on tehtud päris inimesega või tehisintellektiga, siis kumba sa arvaksid? Miks?</label>
            <textarea id="feedback-${idx}-95" rows="4"></textarea>
        </div>
    `;
    root.appendChild(textCard);

    // Button
    const btnCard = el("div", { class: "card" });
    const errDiv = el("div", { id: `interview-error-${idx}` });
    btnCard.appendChild(errDiv);
    const btn = el("button", {
        class: "btn",
        onclick: () => validateAndContinue(idx)
    }, idx === 0 ? "Edasi teise intervjuu juurde →" : "Edasi kokkuvõttesse →");
    btnCard.appendChild(btn);
    root.appendChild(btnCard);
    window.scrollTo(0, 0);
}

function renderRatingBox(interviewIdx, interviewId, blockNr) {
    const blockData = RATING_STATEMENTS[String(blockNr)];
    if (!blockData) return el("div");
    const box = el("div", { class: "rating-box" });
    box.innerHTML = `<h4>✏️ HINDAMINE: ${escapeHtml(blockData.title)}</h4><p class="scale-info">Skaala: 1 = ei nõustu üldse · 2 = pigem ei nõustu · 3 = nii ja naa · 4 = pigem nõustun · 5 = nõustun täielikult</p>`;
    blockData.items.forEach(([code, text]) => {
        const item = el("div", { class: "rating-item" });
        const rName = `r_${interviewIdx}_${interviewId}_${code}`;
        item.innerHTML = `
            <p><strong>${code}</strong> — ${escapeHtml(text)}</p>
            <div class="rating-scale">
                ${[1,2,3,4,5].map(v => `<label><input type="radio" name="${rName}" value="${v}"><span class="num">${v}</span></label>`).join("")}
            </div>
        `;
        box.appendChild(item);
    });
    return box;
}

function validateAndContinue(idx) {
    const interview = INTERVIEWS[idx];
    // Collect ratings
    const missing = [];
    [2,3,4,5,6,7,8,9].forEach(blockNr => {
        const blockData = RATING_STATEMENTS[String(blockNr)];
        if (!blockData) return;
        blockData.items.forEach(([code, _]) => {
            const rName = `r_${idx}_${interview.id}_${code}`;
            const sel = document.querySelector(`input[name="${rName}"]:checked`);
            if (sel) {
                state.ratings[`${interview.id}_${code}`] = parseInt(sel.value);
            } else {
                missing.push(code);
            }
        });
    });

    // Collect feedback
    ["93","94","95"].forEach(q => {
        const ta = document.getElementById(`feedback-${idx}-${q}`);
        if (ta && ta.value.trim()) {
            state.feedback[`${interview.id}_${q}`] = ta.value.trim();
        }
    });

    if (missing.length > 0) {
        const errDiv = document.getElementById(`interview-error-${idx}`);
        errDiv.innerHTML = `<div class="error-msg">Palun hinda kõik väited. Puudu on: ${missing.join(", ")}</div>`;
        return;
    }

    if (idx === 0) {
        renderInterview(1);
    } else {
        submitResults();
    }
}

    clearContent();
    renderProgress("Samm 4/4 — Saatmine", 95);
    const root = document.getElementById("content");
    root.appendChild(el("div", { class: "card", html: `<h1>Saadan vastuseid...</h1><p>Palun oota hetk.</p>` }));

    const payload = {
        pair: state.pair,
        order: state.order,
        interview_1_id: INTERVIEWS[0].id,
        interview_2_id: INTERVIEWS[1].id,
        ratings: state.ratings,
        feedback: state.feedback,
        duration_sec: Math.round((Date.now() - state.startTime) / 1000),
        timestamp: new Date().toISOString()
    };

    try {
        const resp = await fetch(FORMSPREE_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json", "Accept": "application/json" },
            body: JSON.stringify(payload)
        });
        if (resp.ok) {
            renderThankYou();
        } else {
            throw new Error("Server error: " + resp.status);
        }
    } catch (err) {
        clearContent();
        renderProgress("Viga", 95);
        document.getElementById("content").appendChild(el("div", { class: "card", html: `
            <h1>Viga saatmisel</h1>
            <div class="error-msg">${escapeHtml(err.message)}</div>
            <p>Palun proovi uuesti või võta uurijaga ühendust.</p>
            <pre style="font-size:11px;overflow:auto;max-height:200px">${escapeHtml(JSON.stringify(payload, null, 2))}</pre>
        `}));
    }
}

function renderThankYou() {
    clearContent();
    renderProgress("Valmis!", 100);
    document.getElementById("content").appendChild(el("div", { class: "card", html: `
        <h1>Aitäh osalemise eest!</h1>
        <div class="success-msg"><strong>Sinu vastused on edukalt saadetud.</strong></div>
        <p>Sinu hinnangud aitavad oluliselt kaasa minu magistritöö valmimisele.</p>
        <p>Kui sul on küsimusi uuringu kohta või soovid teada tulemusi, võid minuga ühendust võtta.</p>
        <p style="margin-top: 32px;"><strong>Veel kord suur aitäh!</strong><br>Katrin Primak</p>
        <div style="text-align:center; margin-top:40px;">
            <a href="index.html" style="display:inline-block; padding:12px 20px; background:#4f46e5; color:white; text-decoration:none; border-radius:6px; font-weight:bold;">
                🔁 Vali uus intervjuu paar
            </a>
        </div>
    `}));
}

renderIntro();
</script>
</body>
</html>
